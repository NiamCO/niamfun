<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ant Architect</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{background:#1a1408;overflow:hidden;height:100vh;font-family:'DM Sans',sans-serif;color:#fff;margin:0;display:flex;flex-direction:column}
canvas{flex:1;display:block;cursor:crosshair;image-rendering:auto}

.top{
  display:flex;align-items:center;justify-content:space-between;
  background:rgba(10,8,4,.9);backdrop-filter:blur(6px);
  border-bottom:1px solid rgba(255,255,255,.04);
  padding:5px 14px;z-index:10;flex-shrink:0;
}
.top-left{display:flex;align-items:center;gap:10px}
.title{font-size:.9rem;font-weight:700;color:#d4a54a;display:flex;align-items:center;gap:5px}
.counters{display:flex;gap:6px}
.ctr{display:flex;align-items:center;gap:4px;background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.04);border-radius:7px;padding:3px 9px}
.ctr .cv{font-family:'JetBrains Mono',monospace;font-size:.7rem;font-weight:600;color:#d4a54a}
.ctr .cl{font-size:.42rem;color:rgba(255,255,255,.25);text-transform:uppercase;letter-spacing:.7px}

.tools{display:flex;gap:2px}
.tl{
  padding:5px 12px;border-radius:8px;border:1px solid transparent;
  background:none;color:rgba(255,255,255,.3);cursor:pointer;
  font-family:'DM Sans',sans-serif;font-size:.5rem;font-weight:600;
  text-transform:uppercase;letter-spacing:.4px;transition:all .1s;
  display:flex;align-items:center;gap:4px;
}
.tl:hover{color:#fff;background:rgba(255,255,255,.03)}
.tl.on{color:#fff;border-color:rgba(212,165,74,.3);background:rgba(212,165,74,.06)}
.tl .ic{font-size:.8rem}

.bot{
  display:flex;align-items:center;justify-content:space-between;
  background:rgba(10,8,4,.9);border-top:1px solid rgba(255,255,255,.04);
  padding:4px 14px;z-index:10;flex-shrink:0;font-size:.55rem;color:rgba(255,255,255,.25)
}
.bot-left,.bot-right{display:flex;align-items:center;gap:8px}
.bot label{display:flex;align-items:center;gap:4px}
.bot input[type=range]{width:50px;-webkit-appearance:none;height:3px;background:rgba(255,255,255,.08);border-radius:2px;outline:none}
.bot input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:10px;height:10px;border-radius:50%;background:#d4a54a;cursor:pointer}
.bbtn{padding:3px 8px;border-radius:4px;border:1px solid rgba(255,255,255,.06);background:none;color:rgba(255,255,255,.3);cursor:pointer;font-family:'DM Sans',sans-serif;font-size:.5rem;font-weight:600;transition:all .1s}
.bbtn:hover{color:#fff;border-color:rgba(255,255,255,.15)}
.stat{font-family:'JetBrains Mono',monospace;color:#d4a54a}
</style>
</head>
<body>

<div class="top">
  <div class="top-left">
    <div class="title">🐜 Ant Architect</div>
    <div class="counters">
      <div class="ctr"><div><div class="cv" id="cAnts">0</div><div class="cl">Ants</div></div></div>
      <div class="ctr"><div><div class="cv" id="cFood">0</div><div class="cl">Food</div></div></div>
      <div class="ctr"><div><div class="cv" id="cCollected">0</div><div class="cl">Collected</div></div></div>
    </div>
  </div>
  <div class="tools">
    <button class="tl on" data-t="ant"><span class="ic">🐜</span>Ants</button>
    <button class="tl" data-t="food"><span class="ic">🍎</span>Food</button>
    <button class="tl" data-t="wall"><span class="ic">🧱</span>Wall</button>
    <button class="tl" data-t="nest"><span class="ic">🏠</span>Nest</button>
    <button class="tl" data-t="erase"><span class="ic">🧹</span>Erase</button>
  </div>
</div>

<canvas id="c"></canvas>

<div class="bot">
  <div class="bot-left">
    <label>Speed <input type="range" id="speedSl" min="1" max="5" value="2"> <span id="speedV">2×</span></label>
    <label>Brush <input type="range" id="brushSl" min="1" max="6" value="2"> <span id="brushV">2</span></label>
    <label><input type="checkbox" id="showPh" checked> Pheromones</label>
  </div>
  <div class="bot-right">
    <span>FPS: <span class="stat" id="fpsV">60</span></span>
    <button class="bbtn" id="pauseBtn">⏸</button>
    <button class="bbtn" id="clearBtn">🗑 Clear</button>
  </div>
</div>

<script>
const C=document.getElementById('c'),X=C.getContext('2d');
let W,H,COLS,ROWS;
const CELL=6;

function resize(){
  const tb=document.querySelector('.top').offsetHeight;
  const bb=document.querySelector('.bot').offsetHeight;
  W=C.width=innerWidth;
  H=C.height=innerHeight-tb-bb;
  COLS=Math.ceil(W/CELL);
  ROWS=Math.ceil(H/CELL);
  initGrids();
}

// ═══════════════ GRIDS ═══════════════
var phHome=null;   // pheromone: trail back to nest
var phFood=null;   // pheromone: trail to food
var walls=null;    // wall grid
var ants=[];
var foods=[];      // {x,y,amount}
var nests=[];      // {x,y}
var collected=0;
var tool='ant';
var speed=2;
var brushSize=2;
var showPheromones=true;
var paused=false;

function initGrids(){
  if(!phHome||phHome.length!==COLS*ROWS){
    phHome=new Float32Array(COLS*ROWS);
    phFood=new Float32Array(COLS*ROWS);
    walls=new Uint8Array(COLS*ROWS);
  }
}

function clearAll(){
  phHome.fill(0);phFood.fill(0);walls.fill(0);
  ants=[];foods=[];nests=[];collected=0;
  // Default nest in center
  nests.push({x:W/2,y:H/2});
}

resize();addEventListener('resize',resize);
clearAll();

// ═══════════════ ANT CLASS ═══════════════
class Ant{
  constructor(x,y){
    this.x=x;this.y=y;
    this.angle=Math.random()*Math.PI*2;
    this.speed=1.2+Math.random()*0.6;
    this.hasFood=false;
    this.turnBias=(Math.random()-.5)*0.3;
    this.wanderTimer=0;
    this.stuckTimer=0;
    this.prevX=x;this.prevY=y;
  }
}

// ═══════════════ PHEROMONE HELPERS ═══════════════
function gIdx(x,y){
  const c=Math.floor(x/CELL),r=Math.floor(y/CELL);
  if(c<0||c>=COLS||r<0||r>=ROWS)return-1;
  return r*COLS+c;
}
function isWall(x,y){const i=gIdx(x,y);return i>=0&&walls[i]>0}
function samplePh(grid,x,y,angle,offset){
  const sx=x+Math.cos(angle+offset)*12;
  const sy=y+Math.sin(angle+offset)*12;
  const i=gIdx(sx,sy);
  if(i<0||walls[i])return-1;
  return grid[i];
}

// ═══════════════ ANT AI ═══════════════
function updateAnt(ant){
  for(let s=0;s<speed;s++){
    const spd=ant.speed*1.2;

    // Deposit pheromones
    const idx=gIdx(ant.x,ant.y);
    if(idx>=0){
      if(ant.hasFood){
        phFood[idx]=Math.min(1,phFood[idx]+0.15);
      } else {
        phHome[idx]=Math.min(1,phHome[idx]+0.15);
      }
    }

    // Sense pheromones
    const targetGrid=ant.hasFood?phHome:phFood;
    const fwd=samplePh(targetGrid,ant.x,ant.y,ant.angle,0);
    const left=samplePh(targetGrid,ant.x,ant.y,ant.angle,-0.5);
    const right=samplePh(targetGrid,ant.x,ant.y,ant.angle,0.5);

    // Steer toward strongest pheromone
    if(fwd>=0&&left>=0&&right>=0){
      if(left>fwd&&left>right) ant.angle-=0.2;
      else if(right>fwd&&right>left) ant.angle+=0.2;
      else if(fwd<0.01) ant.angle+=(Math.random()-.5)*0.6+ant.turnBias*0.1;
    }

    // Random wander component
    ant.wanderTimer--;
    if(ant.wanderTimer<=0){
      ant.angle+=(Math.random()-.5)*0.8+ant.turnBias*0.1;
      ant.wanderTimer=10+Math.floor(Math.random()*20);
    }

    // Check if stuck
    if(Math.hypot(ant.x-ant.prevX,ant.y-ant.prevY)<0.5){
      ant.stuckTimer++;
      if(ant.stuckTimer>30){
        ant.angle+=Math.PI*(0.5+Math.random());
        ant.stuckTimer=0;
      }
    } else {
      ant.stuckTimer=0;
    }
    ant.prevX=ant.x;ant.prevY=ant.y;

    // Move
    let nx=ant.x+Math.cos(ant.angle)*spd;
    let ny=ant.y+Math.sin(ant.angle)*spd;

    // Wall collision
    if(isWall(nx,ny)){
      ant.angle+=Math.PI*0.5+Math.random()*Math.PI;
      nx=ant.x;ny=ant.y;
    }

    // Bounds
    if(nx<4||nx>W-4){ant.angle=Math.PI-ant.angle;nx=Math.max(4,Math.min(W-4,nx))}
    if(ny<4||ny>H-4){ant.angle=-ant.angle;ny=Math.max(4,Math.min(H-4,ny))}

    ant.x=nx;ant.y=ny;

    // Pick up food
    if(!ant.hasFood){
      for(const f of foods){
        if(f.amount>0&&Math.hypot(f.x-ant.x,f.y-ant.y)<10){
          ant.hasFood=true;
          f.amount--;
          ant.angle+=Math.PI; // turn around
          break;
        }
      }
    }

    // Return food to nest
    if(ant.hasFood){
      for(const n of nests){
        if(Math.hypot(n.x-ant.x,n.y-ant.y)<15){
          ant.hasFood=false;
          collected++;
          ant.angle+=Math.PI;
          break;
        }
      }
    }

    // Attraction toward nest/food (slight bias)
    if(ant.hasFood&&nests.length>0){
      const n=nests[0];
      const da=Math.atan2(n.y-ant.y,n.x-ant.x);
      let diff=da-ant.angle;
      while(diff>Math.PI)diff-=Math.PI*2;
      while(diff<-Math.PI)diff+=Math.PI*2;
      ant.angle+=diff*0.01;
    }
  }
}

// ═══════════════ PHEROMONE DECAY ═══════════════
function decayPheromones(){
  const decay=0.997;
  const diffuse=0.01;
  for(let i=0;i<COLS*ROWS;i++){
    if(walls[i])continue;
    phHome[i]*=decay;
    phFood[i]*=decay;
    // Simple diffusion
    if(i>COLS&&i<COLS*(ROWS-1)){
      const neighbors=[i-1,i+1,i-COLS,i+COLS];
      for(const n of neighbors){
        if(n>=0&&n<COLS*ROWS&&!walls[n]){
          const dh=(phHome[i]-phHome[n])*diffuse;
          phHome[i]-=dh;phHome[n]+=dh;
          const df=(phFood[i]-phFood[n])*diffuse;
          phFood[i]-=df;phFood[n]+=df;
        }
      }
    }
    if(phHome[i]<0.001)phHome[i]=0;
    if(phFood[i]<0.001)phFood[i]=0;
  }
}

// ═══════════════ UPDATE ═══════════════
function update(){
  if(paused)return;
  for(const ant of ants)updateAnt(ant);
  decayPheromones();
  // Remove empty food
  foods=foods.filter(f=>f.amount>0);
  // HUD
  document.getElementById('cAnts').textContent=ants.length;
  document.getElementById('cFood').textContent=foods.reduce((s,f)=>s+f.amount,0);
  document.getElementById('cCollected').textContent=collected;
}

// ═══════════════ RENDER ═══════════════
function render(){
  // Ground
  X.fillStyle='#1a1408';X.fillRect(0,0,W,H);

  // Subtle dirt texture
  X.globalAlpha=0.03;
  for(let i=0;i<100;i++){
    X.fillStyle='#2a1e0a';
    X.beginPath();X.arc((i*137)%W,(i*251)%H,2+Math.random()*4,0,Math.PI*2);X.fill();
  }
  X.globalAlpha=1;

  // Pheromones
  if(showPheromones){
    for(let r=0;r<ROWS;r++){
      for(let c=0;c<COLS;c++){
        const i=r*COLS+c;
        const h=phHome[i],f=phFood[i];
        if(h>0.01){
          X.fillStyle=`rgba(80,140,255,${Math.min(0.35,h*0.4)})`;
          X.fillRect(c*CELL,r*CELL,CELL,CELL);
        }
        if(f>0.01){
          X.fillStyle=`rgba(80,255,80,${Math.min(0.35,f*0.4)})`;
          X.fillRect(c*CELL,r*CELL,CELL,CELL);
        }
      }
    }
  }

  // Walls
  for(let r=0;r<ROWS;r++){
    for(let c=0;c<COLS;c++){
      if(walls[r*COLS+c]){
        X.fillStyle='#3d2e1a';
        X.fillRect(c*CELL,r*CELL,CELL,CELL);
        X.strokeStyle='rgba(255,255,255,.04)';X.lineWidth=0.5;
        X.strokeRect(c*CELL,r*CELL,CELL,CELL);
      }
    }
  }

  // Nests
  for(const n of nests){
    // Mound
    const ng=X.createRadialGradient(n.x,n.y,0,n.x,n.y,18);
    ng.addColorStop(0,'#4a3520');ng.addColorStop(0.6,'#3a2815');ng.addColorStop(1,'transparent');
    X.fillStyle=ng;X.beginPath();X.arc(n.x,n.y,18,0,Math.PI*2);X.fill();
    // Hole
    X.beginPath();X.arc(n.x,n.y,5,0,Math.PI*2);
    X.fillStyle='#1a0e04';X.fill();
    // Ring
    X.beginPath();X.arc(n.x,n.y,8,0,Math.PI*2);
    X.strokeStyle='rgba(212,165,74,.2)';X.lineWidth=1;X.stroke();
    // Label
    X.font='8px DM Sans';X.fillStyle='rgba(212,165,74,.3)';X.textAlign='center';
    X.fillText('NEST',n.x,n.y+26);
  }

  // Food
  for(const f of foods){
    const size=3+Math.min(6,f.amount*0.3);
    X.beginPath();X.arc(f.x,f.y,size,0,Math.PI*2);
    const fg=X.createRadialGradient(f.x-1,f.y-1,0,f.x,f.y,size);
    fg.addColorStop(0,'#6dcc44');fg.addColorStop(1,'#3a7a20');
    X.fillStyle=fg;X.fill();
    // Amount
    if(f.amount>1){
      X.font='bold 7px JetBrains Mono';X.fillStyle='rgba(255,255,255,.4)';X.textAlign='center';
      X.fillText(f.amount,f.x,f.y+size+9);
    }
  }

  // Ants
  for(const ant of ants){
    X.save();X.translate(ant.x,ant.y);X.rotate(ant.angle);

    // Body segments
    const bodyColor=ant.hasFood?'#cc8833':'#2a1a0a';
    // Abdomen
    X.beginPath();X.ellipse(-3,0,3.5,2.5,0,0,Math.PI*2);
    X.fillStyle=bodyColor;X.fill();
    // Thorax
    X.beginPath();X.ellipse(1.5,0,2,1.8,0,0,Math.PI*2);
    X.fillStyle=bodyColor;X.fill();
    // Head
    X.beginPath();X.ellipse(4.5,0,2,1.5,0,0,Math.PI*2);
    X.fillStyle=bodyColor;X.fill();

    // Antennae
    X.strokeStyle=bodyColor;X.lineWidth=0.5;
    X.beginPath();X.moveTo(6,-.5);X.lineTo(8,-2.5);X.stroke();
    X.beginPath();X.moveTo(6,.5);X.lineTo(8,2.5);X.stroke();

    // Legs
    X.lineWidth=0.4;
    const legPhase=ant.x*0.3+ant.y*0.2;
    for(let l=0;l<3;l++){
      const lx=-1+l*2.5;
      const ly=Math.sin(legPhase+l*1.5)*1;
      X.beginPath();X.moveTo(lx,0);X.lineTo(lx-1,-3+ly);X.stroke();
      X.beginPath();X.moveTo(lx,0);X.lineTo(lx-1,3-ly);X.stroke();
    }

    // Food dot
    if(ant.hasFood){
      X.beginPath();X.arc(6.5,0,1.5,0,Math.PI*2);
      X.fillStyle='#6dcc44';X.fill();
    }

    X.restore();
  }

  // Cursor
  if(tool==='wall'||tool==='erase'){
    X.beginPath();X.arc(mx,my,brushSize*CELL,0,Math.PI*2);
    X.strokeStyle='rgba(255,255,255,.1)';X.lineWidth=1;X.stroke();
  }
}

// ═══════════════ INPUT ═══════════════
var mouseDown=false,mx=0,my=0;

C.addEventListener('mousedown',e=>{mouseDown=true;mx=e.offsetX;my=e.offsetY;doPlace()});
C.addEventListener('mousemove',e=>{mx=e.offsetX;my=e.offsetY;if(mouseDown)doPlace()});
C.addEventListener('mouseup',()=>mouseDown=false);
C.addEventListener('touchstart',e=>{e.preventDefault();mouseDown=true;const t=e.touches[0],r=C.getBoundingClientRect();mx=t.clientX-r.left;my=t.clientY-r.top;doPlace()},{passive:false});
C.addEventListener('touchmove',e=>{e.preventDefault();const t=e.touches[0],r=C.getBoundingClientRect();mx=t.clientX-r.left;my=t.clientY-r.top;if(mouseDown)doPlace()},{passive:false});
C.addEventListener('touchend',()=>mouseDown=false);

function doPlace(){
  if(tool==='ant'){
    for(let i=0;i<3;i++){
      if(ants.length>=500)break;
      ants.push(new Ant(mx+(Math.random()-.5)*15,my+(Math.random()-.5)*15));
    }
  } else if(tool==='food'){
    // Check if food already near
    const existing=foods.find(f=>Math.hypot(f.x-mx,f.y-my)<12);
    if(existing){existing.amount+=5}
    else foods.push({x:mx,y:my,amount:15});
  } else if(tool==='wall'){
    const bs=brushSize;
    const cc=Math.floor(mx/CELL),cr=Math.floor(my/CELL);
    for(let dr=-bs;dr<=bs;dr++){
      for(let dc=-bs;dc<=bs;dc++){
        if(dr*dr+dc*dc>bs*bs)continue;
        const r=cr+dr,c=cc+dc;
        if(r>=0&&r<ROWS&&c>=0&&c<COLS)walls[r*COLS+c]=1;
      }
    }
  } else if(tool==='nest'){
    nests.push({x:mx,y:my});
  } else if(tool==='erase'){
    const bs=brushSize;
    const cc=Math.floor(mx/CELL),cr=Math.floor(my/CELL);
    for(let dr=-bs;dr<=bs;dr++){
      for(let dc=-bs;dc<=bs;dc++){
        const r=cr+dr,c=cc+dc;
        if(r>=0&&r<ROWS&&c>=0&&c<COLS){walls[r*COLS+c]=0;phHome[r*COLS+c]=0;phFood[r*COLS+c]=0}
      }
    }
    foods=foods.filter(f=>Math.hypot(f.x-mx,f.y-my)>brushSize*CELL);
    ants=ants.filter(a=>Math.hypot(a.x-mx,a.y-my)>brushSize*CELL);
    nests=nests.filter(n=>Math.hypot(n.x-mx,n.y-my)>brushSize*CELL);
  }
}

// Toolbar
document.querySelectorAll('.tl').forEach(btn=>{
  btn.addEventListener('click',()=>{
    document.querySelectorAll('.tl').forEach(b=>b.classList.remove('on'));
    btn.classList.add('on');
    tool=btn.dataset.t;
  });
});

document.getElementById('speedSl').addEventListener('input',function(){speed=+this.value;document.getElementById('speedV').textContent=speed+'×'});
document.getElementById('brushSl').addEventListener('input',function(){brushSize=+this.value;document.getElementById('brushV').textContent=this.value});
document.getElementById('showPh').addEventListener('change',function(){showPheromones=this.checked});
document.getElementById('pauseBtn').addEventListener('click',function(){paused=!paused;this.textContent=paused?'▶':'⏸'});
document.getElementById('clearBtn').addEventListener('click',clearAll);

// ═══════════════ LOOP ═══════════════
var lastT=0,fpsC=0,fpsT=0;
function loop(t){
  fpsC++;if(t-fpsT>500){document.getElementById('fpsV').textContent=Math.round(fpsC*1000/(t-fpsT));fpsC=0;fpsT=t}
  update();render();
  requestAnimationFrame(loop);
}
requestAnimationFrame(loop);
</script>
</body>
</html>
