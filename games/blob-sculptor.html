<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Blob Sculptor</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{background:#0c0814;overflow:hidden;height:100vh;font-family:'DM Sans',sans-serif;margin:0}
canvas{display:block;touch-action:none}

.toolbar{
  position:fixed;bottom:14px;left:50%;transform:translateX(-50%);
  display:flex;gap:3px;z-index:10;
  background:rgba(12,8,20,.88);backdrop-filter:blur(10px);
  border:1px solid rgba(255,255,255,.06);border-radius:14px;padding:4px;
}
.tb{
  padding:6px 13px;border-radius:10px;border:1px solid transparent;
  background:none;color:rgba(255,255,255,.35);cursor:pointer;
  font-family:'DM Sans',sans-serif;font-size:.55rem;font-weight:600;
  text-transform:uppercase;letter-spacing:.5px;transition:all .1s;
  display:flex;align-items:center;gap:4px;
}
.tb:hover{color:#fff;background:rgba(255,255,255,.04)}
.tb.on{color:#fff;border-color:rgba(167,139,250,.3);background:rgba(167,139,250,.08)}
.tb .ico{font-size:.85rem}

.side{
  position:fixed;right:12px;top:50%;transform:translateY(-50%);
  display:flex;flex-direction:column;gap:5px;z-index:10;
}
.sb{
  background:rgba(12,8,20,.85);backdrop-filter:blur(10px);
  border:1px solid rgba(255,255,255,.06);border-radius:9px;
  padding:7px 10px;display:flex;flex-direction:column;gap:3px;
}
.sb label{font-size:.45rem;color:rgba(255,255,255,.25);text-transform:uppercase;letter-spacing:.8px;font-weight:600}
.sb input[type=range]{width:70px;-webkit-appearance:none;height:3px;background:rgba(255,255,255,.08);border-radius:2px;outline:none}
.sb input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:11px;height:11px;border-radius:50%;background:#a78bfa;cursor:pointer;border:2px solid #0c0814}
.sbtn{
  padding:5px 10px;border-radius:6px;border:1px solid rgba(255,255,255,.06);
  background:rgba(255,255,255,.02);color:rgba(255,255,255,.35);
  font-family:'DM Sans',sans-serif;font-size:.5rem;font-weight:600;
  cursor:pointer;transition:all .1s;text-align:center;
}
.sbtn:hover{color:#fff;border-color:rgba(167,139,250,.3)}
</style>
</head>
<body>
<canvas id="c"></canvas>

<div class="toolbar">
  <button class="tb on" data-shape="blob"><span class="ico">🫧</span>Blob</button>
  <button class="tb" data-shape="face"><span class="ico">😊</span>Face</button>
  <button class="tb" data-shape="star"><span class="ico">⭐</span>Star</button>
  <button class="tb" data-shape="heart"><span class="ico">❤️</span>Heart</button>
  <button class="tb" data-shape="square"><span class="ico">🟪</span>Square</button>
  <button class="tb" data-shape="triangle"><span class="ico">🔺</span>Triangle</button>
  <button class="tb" data-shape="donut"><span class="ico">🍩</span>Donut</button>
</div>

<div class="side">
  <div class="sb"><label>Stiffness</label><input type="range" id="stiffness" min="1" max="30" value="12"></div>
  <div class="sb"><label>Bounce</label><input type="range" id="bounce" min="1" max="15" value="8"></div>
  <div class="sb"><label>Gravity</label><input type="range" id="gravity" min="0" max="20" value="6"></div>
  <div class="sb"><label>Color</label><input type="range" id="hueSlider" min="0" max="360" value="270"></div>
  <button class="sbtn" id="resetBtn">↻ Reset</button>
  <button class="sbtn" id="flingBtn">🎲 Fling!</button>
</div>

<script>
const C=document.getElementById('c'),X=C.getContext('2d');
let W,H;
function resize(){W=C.width=innerWidth;H=C.height=innerHeight}
resize();addEventListener('resize',resize);

// ═══════════════════════════════════════════════════
//  VERLET SOFT BODY ENGINE
// ═══════════════════════════════════════════════════
let pts=[];      // {x, y, ox, oy, pinned}
let sticks=[];   // {a, b, len}
let shape='blob';
let hue=270;
let stiffness=12;
let bounceVal=8;
let gravityVal=6;
let grabbed=null;
let mx=0,my=0,pmx=0,pmy=0;
let mouseDown=false;

// ═══════════════════════════════════════════════════
//  SHAPE GENERATORS
// ═══════════════════════════════════════════════════
function buildShape(type){
  pts=[];sticks=[];
  const cx=W/2,cy=H/2;

  if(type==='blob'){
    // Outer ring + inner points for a squishy ball
    const outerN=28,innerN=8,R=100,Ri=40;
    for(let i=0;i<outerN;i++){
      const a=(i/outerN)*Math.PI*2;
      pts.push(mkPt(cx+Math.cos(a)*R,cy+Math.sin(a)*R));
    }
    // Connect outer ring
    for(let i=0;i<outerN;i++) sticks.push(mkStick(i,(i+1)%outerN));
    // Cross-bracing outer
    for(let i=0;i<outerN;i++) sticks.push(mkStick(i,(i+Math.floor(outerN/2))%outerN));
    for(let i=0;i<outerN;i++) sticks.push(mkStick(i,(i+Math.floor(outerN/3))%outerN));
    // Inner ring
    for(let i=0;i<innerN;i++){
      const a=(i/innerN)*Math.PI*2;
      pts.push(mkPt(cx+Math.cos(a)*Ri,cy+Math.sin(a)*Ri));
    }
    // Connect inner
    for(let i=0;i<innerN;i++) sticks.push(mkStick(outerN+i,outerN+(i+1)%innerN));
    // Connect inner to outer
    for(let i=0;i<innerN;i++){
      const oi=Math.round((i/innerN)*outerN)%outerN;
      sticks.push(mkStick(outerN+i,oi));
      sticks.push(mkStick(outerN+i,(oi+1)%outerN));
      sticks.push(mkStick(outerN+i,(oi-1+outerN)%outerN));
    }
    // Center point
    pts.push(mkPt(cx,cy));
    const ci=pts.length-1;
    for(let i=0;i<innerN;i++) sticks.push(mkStick(ci,outerN+i));
    for(let i=0;i<outerN;i+=3) sticks.push(mkStick(ci,i));
  }
  else if(type==='face'){
    // Circle with face features
    const N=24,R=100;
    for(let i=0;i<N;i++){
      const a=(i/N)*Math.PI*2;
      pts.push(mkPt(cx+Math.cos(a)*R,cy+Math.sin(a)*R));
    }
    for(let i=0;i<N;i++) sticks.push(mkStick(i,(i+1)%N));
    for(let i=0;i<N;i++) sticks.push(mkStick(i,(i+N/2)%N));
    for(let i=0;i<N;i++) sticks.push(mkStick(i,(i+N/3|0)%N));
    // Eyes
    pts.push(mkPt(cx-30,cy-25)); // left eye
    pts.push(mkPt(cx+30,cy-25)); // right eye
    // Mouth corners
    pts.push(mkPt(cx-25,cy+30));
    pts.push(mkPt(cx+25,cy+30));
    pts.push(mkPt(cx,cy+40)); // mouth bottom
    // Nose
    pts.push(mkPt(cx,cy));
    const ei=N;
    // Connect features to body
    for(let f=ei;f<pts.length;f++){
      // Find closest outer points
      let closest=[];
      for(let i=0;i<N;i++){
        closest.push({i,d:Math.hypot(pts[i].x-pts[f].x,pts[i].y-pts[f].y)});
      }
      closest.sort((a,b)=>a.d-b.d);
      for(let k=0;k<4;k++) sticks.push(mkStick(f,closest[k].i));
    }
    // Connect features to each other
    sticks.push(mkStick(ei,ei+1)); // eyes
    sticks.push(mkStick(ei+2,ei+3)); // mouth sides
    sticks.push(mkStick(ei+2,ei+4)); // mouth
    sticks.push(mkStick(ei+3,ei+4));
    sticks.push(mkStick(ei+5,ei)); // nose to eyes
    sticks.push(mkStick(ei+5,ei+1));
    sticks.push(mkStick(ei+5,ei+4)); // nose to mouth
  }
  else if(type==='star'){
    const spikes=5,Ro=110,Ri=45;
    for(let i=0;i<spikes*2;i++){
      const a=(i/(spikes*2))*Math.PI*2-Math.PI/2;
      const r=i%2===0?Ro:Ri;
      pts.push(mkPt(cx+Math.cos(a)*r,cy+Math.sin(a)*r));
    }
    const N=spikes*2;
    for(let i=0;i<N;i++) sticks.push(mkStick(i,(i+1)%N));
    for(let i=0;i<N;i++) sticks.push(mkStick(i,(i+2)%N));
    pts.push(mkPt(cx,cy));
    for(let i=0;i<N;i++) sticks.push(mkStick(N,i));
  }
  else if(type==='heart'){
    const N=30;
    for(let i=0;i<N;i++){
      const t=(i/N)*Math.PI*2;
      const hx=16*Math.pow(Math.sin(t),3);
      const hy=-(13*Math.cos(t)-5*Math.cos(2*t)-2*Math.cos(3*t)-Math.cos(4*t));
      pts.push(mkPt(cx+hx*6,cy+hy*6));
    }
    for(let i=0;i<N;i++) sticks.push(mkStick(i,(i+1)%N));
    for(let i=0;i<N;i++) sticks.push(mkStick(i,(i+N/2|0)%N));
    for(let i=0;i<N;i++) sticks.push(mkStick(i,(i+N/3|0)%N));
    pts.push(mkPt(cx,cy));
    for(let i=0;i<N;i+=2) sticks.push(mkStick(N,i));
  }
  else if(type==='square'){
    const S=90,div=6;
    const grid=[];
    for(let y=0;y<=div;y++){
      grid[y]=[];
      for(let x=0;x<=div;x++){
        const idx=pts.length;
        pts.push(mkPt(cx-S+x*(S*2/div),cy-S+y*(S*2/div)));
        grid[y][x]=idx;
      }
    }
    for(let y=0;y<=div;y++){
      for(let x=0;x<=div;x++){
        if(x<div) sticks.push(mkStick(grid[y][x],grid[y][x+1]));
        if(y<div) sticks.push(mkStick(grid[y][x],grid[y+1][x]));
        if(x<div&&y<div) sticks.push(mkStick(grid[y][x],grid[y+1][x+1]));
        if(x>0&&y<div) sticks.push(mkStick(grid[y][x],grid[y+1][x-1]));
      }
    }
  }
  else if(type==='triangle'){
    const rows=7,S=30;
    const grid=[];
    for(let r=0;r<rows;r++){
      grid[r]=[];
      const cols=r+1;
      const rowW=cols*S;
      for(let c=0;c<cols;c++){
        const idx=pts.length;
        pts.push(mkPt(cx-rowW/2+c*S+S/2,cy-rows*S/2+r*S*0.87));
        grid[r][c]=idx;
        if(c>0) sticks.push(mkStick(idx,idx-1));
        if(r>0){
          if(c<grid[r-1].length) sticks.push(mkStick(idx,grid[r-1][c]));
          if(c>0) sticks.push(mkStick(idx,grid[r-1][c-1]));
        }
      }
    }
    // Extra cross bracing
    for(let r=0;r<rows-2;r++){
      for(let c=0;c<grid[r].length;c++){
        if(c+1<grid[r+2].length) sticks.push(mkStick(grid[r][c],grid[r+2][c+1]));
      }
    }
  }
  else if(type==='donut'){
    const outerN=24,innerN=12,Ro=110,Ri=50;
    for(let i=0;i<outerN;i++){
      const a=(i/outerN)*Math.PI*2;
      pts.push(mkPt(cx+Math.cos(a)*Ro,cy+Math.sin(a)*Ro));
    }
    for(let i=0;i<innerN;i++){
      const a=(i/innerN)*Math.PI*2;
      pts.push(mkPt(cx+Math.cos(a)*Ri,cy+Math.sin(a)*Ri));
    }
    // Outer ring
    for(let i=0;i<outerN;i++) sticks.push(mkStick(i,(i+1)%outerN));
    // Inner ring
    for(let i=0;i<innerN;i++) sticks.push(mkStick(outerN+i,outerN+(i+1)%innerN));
    // Connect rings
    for(let i=0;i<outerN;i++){
      const ii=Math.round((i/outerN)*innerN)%innerN;
      sticks.push(mkStick(i,outerN+ii));
    }
    // Cross brace outer
    for(let i=0;i<outerN;i++) sticks.push(mkStick(i,(i+3)%outerN));
  }
}

function mkPt(x,y){return{x,y,ox:x,oy:y,pinned:false}}
function mkStick(a,b){return{a,b,len:Math.hypot(pts[a].x-pts[b].x,pts[a].y-pts[b].y)}}

// ═══════════════════════════════════════════════════
//  VERLET PHYSICS
// ═══════════════════════════════════════════════════
function physics(){
  const grav=gravityVal*0.04;
  const damp=0.995;
  const bounce=bounceVal*0.06;
  const floor=H-20;
  const wallL=20,wallR=W-20,ceil=20;

  // Verlet integration
  for(const p of pts){
    if(p.pinned)continue;
    const vx=(p.x-p.ox)*damp;
    const vy=(p.y-p.oy)*damp;
    p.ox=p.x;p.oy=p.y;
    p.x+=vx;
    p.y+=vy+grav;
  }

  // Constraint solving (multiple iterations for stiffness)
  const iters=Math.max(3,Math.floor(stiffness/2));
  for(let iter=0;iter<iters;iter++){
    for(const s of sticks){
      const a=pts[s.a],b=pts[s.b];
      const dx=b.x-a.x,dy=b.y-a.y;
      const d=Math.hypot(dx,dy)||0.001;
      const diff=(s.len-d)/d*0.5;
      const ox=dx*diff,oy=dy*diff;
      if(!a.pinned){a.x-=ox;a.y-=oy}
      if(!b.pinned){b.x+=ox;b.y+=oy}
    }

    // Collision with walls/floor/ceiling
    for(const p of pts){
      if(p.pinned)continue;
      if(p.y>floor){
        const vy=p.y-p.oy;
        p.y=floor;
        p.oy=p.y+vy*bounce;
        // Friction
        p.ox+=(p.x-p.ox)*0.03;
      }
      if(p.y<ceil){p.y=ceil;p.oy=p.y+(p.y-p.oy)*bounce}
      if(p.x<wallL){p.x=wallL;p.ox=p.x+(p.x-p.ox)*bounce}
      if(p.x>wallR){p.x=wallR;p.ox=p.x+(p.x-p.ox)*bounce}
    }
  }
}

// ═══════════════════════════════════════════════════
//  INPUT
// ═══════════════════════════════════════════════════
function getTouch(e){return e.touches?e.touches[0]:e}
function getEnd(e){return e.changedTouches?e.changedTouches[0]:e}

C.addEventListener('mousedown',onDown);
C.addEventListener('touchstart',e=>{e.preventDefault();onDown(e)},{passive:false});
function onDown(e){
  mouseDown=true;
  const t=getTouch(e);
  mx=t.clientX;my=t.clientY;pmx=mx;pmy=my;
  // Find closest point
  let best=null,bestD=60;
  for(const p of pts){
    const d=Math.hypot(p.x-mx,p.y-my);
    if(d<bestD){bestD=d;best=p}
  }
  if(best){grabbed=best;grabbed.pinned=true}
}

C.addEventListener('mousemove',onMove);
C.addEventListener('touchmove',e=>{e.preventDefault();onMove(e)},{passive:false});
function onMove(e){
  const t=getTouch(e);
  pmx=mx;pmy=my;
  mx=t.clientX;my=t.clientY;
  if(grabbed){
    grabbed.x=mx;grabbed.y=my;
  }
}

C.addEventListener('mouseup',onUp);
C.addEventListener('touchend',e=>{onUp(e)});
function onUp(e){
  if(grabbed){
    grabbed.pinned=false;
    // Fling velocity
    const t=getEnd(e);
    const flingX=(mx-pmx)*1.5;
    const flingY=(my-pmy)*1.5;
    grabbed.ox=grabbed.x-flingX;
    grabbed.oy=grabbed.y-flingY;
    grabbed=null;
  }
  mouseDown=false;
}

// ═══════════════════════════════════════════════════
//  RENDER
// ═══════════════════════════════════════════════════
function render(){
  const t=performance.now()*0.001;
  X.fillStyle='#0c0814';X.fillRect(0,0,W,H);

  // Floor
  X.fillStyle='rgba(167,139,250,0.03)';
  X.fillRect(0,H-20,W,20);
  X.strokeStyle='rgba(167,139,250,0.08)';X.lineWidth=1;
  X.beginPath();X.moveTo(0,H-20);X.lineTo(W,H-20);X.stroke();

  // Find convex hull / outer points for filled shape
  // Use first N points as outline (they're the outer ring in most shapes)
  const outerCount=shape==='blob'?28:shape==='face'?24:shape==='star'?10:
    shape==='heart'?30:shape==='donut'?24:shape==='square'?0:0;

  // ─── Draw sticks (internal structure, very subtle) ───
  X.strokeStyle=`hsla(${hue},50%,50%,0.04)`;X.lineWidth=1;
  for(const s of sticks){
    X.beginPath();X.moveTo(pts[s.a].x,pts[s.a].y);X.lineTo(pts[s.b].x,pts[s.b].y);X.stroke();
  }

  // ─── Draw filled shape ───
  if(outerCount>0){
    // Shadow
    X.save();
    X.beginPath();
    smoothPath(0,outerCount,4,4);
    X.fillStyle=`hsla(${hue},30%,5%,0.5)`;X.fill();
    X.restore();

    // Outer glow
    X.save();
    X.beginPath();smoothPath(0,outerCount,0,0);
    X.strokeStyle=`hsla(${hue},80%,60%,0.06)`;
    X.lineWidth=20;X.shadowColor=`hsla(${hue},80%,50%,0.2)`;X.shadowBlur=30;
    X.stroke();X.shadowBlur=0;X.restore();

    // Main fill
    X.save();X.beginPath();smoothPath(0,outerCount,0,0);
    const cx=pts.slice(0,outerCount).reduce((s,p)=>s+p.x,0)/outerCount;
    const cy=pts.slice(0,outerCount).reduce((s,p)=>s+p.y,0)/outerCount;
    const grd=X.createRadialGradient(cx-40,cy-40,10,cx,cy,160);
    grd.addColorStop(0,`hsla(${hue},75%,65%,0.95)`);
    grd.addColorStop(0.5,`hsla(${hue},60%,45%,0.9)`);
    grd.addColorStop(1,`hsla(${hue+20},45%,25%,0.85)`);
    X.fillStyle=grd;X.fill();
    X.restore();

    // Specular
    X.save();X.beginPath();smoothPath(0,outerCount,0,0);
    X.clip();
    const sg=X.createRadialGradient(cx-50,cy-50,0,cx-30,cy-30,120);
    sg.addColorStop(0,`hsla(${hue},80%,90%,0.4)`);
    sg.addColorStop(0.3,`hsla(${hue},60%,75%,0.1)`);
    sg.addColorStop(1,'transparent');
    X.fillStyle=sg;X.fillRect(0,0,W,H);
    X.restore();

    // Edge
    X.save();X.beginPath();smoothPath(0,outerCount,0,0);
    X.strokeStyle=`hsla(${hue},70%,70%,0.15)`;X.lineWidth=2;X.stroke();
    X.restore();

    // Donut hole
    if(shape==='donut'){
      X.save();X.beginPath();smoothPath(24,12,0,0);
      X.fillStyle='#0c0814';X.fill();
      X.strokeStyle=`hsla(${hue},70%,60%,0.12)`;X.lineWidth=2;X.stroke();
      X.restore();
    }

    // Face features
    if(shape==='face'){
      const eyeL=pts[24],eyeR=pts[25];
      const mL=pts[26],mR=pts[27],mB=pts[28],nose=pts[29];

      // Eyes
      [eyeL,eyeR].forEach(eye=>{
        X.beginPath();X.arc(eye.x,eye.y,10,0,Math.PI*2);
        X.fillStyle='#fff';X.fill();
        // Pupil follows mouse
        const dx=mx-eye.x,dy=my-eye.y;
        const d=Math.hypot(dx,dy)||1;
        const px=eye.x+dx/d*4,py=eye.y+dy/d*4;
        X.beginPath();X.arc(px,py,5,0,Math.PI*2);
        X.fillStyle='#111';X.fill();
        X.beginPath();X.arc(px-1.5,py-1.5,1.8,0,Math.PI*2);
        X.fillStyle='#fff';X.fill();
      });

      // Nose
      X.beginPath();X.arc(nose.x,nose.y,5,0,Math.PI*2);
      X.fillStyle=`hsla(${hue},50%,50%,0.3)`;X.fill();

      // Mouth
      X.beginPath();X.moveTo(mL.x,mL.y);
      X.quadraticCurveTo(mB.x,mB.y,mR.x,mR.y);
      X.strokeStyle=`hsla(${hue},40%,30%,0.6)`;X.lineWidth=3;X.lineCap='round';X.stroke();
    }
  }
  else{
    // Grid shapes (square, triangle) - draw triangulated mesh
    X.save();
    for(const s of sticks){
      const a=pts[s.a],b=pts[s.b];
      const mx2=(a.x+b.x)/2,my2=(a.y+b.y)/2;
      X.beginPath();X.moveTo(a.x,a.y);X.lineTo(b.x,b.y);
      X.strokeStyle=`hsla(${hue},60%,50%,0.35)`;X.lineWidth=3;
      X.shadowColor=`hsla(${hue},80%,50%,0.15)`;X.shadowBlur=6;
      X.stroke();
    }
    X.shadowBlur=0;X.restore();
  }

  // ─── Draw points ───
  for(let i=0;i<pts.length;i++){
    const p=pts[i];
    const isGrabbed=p===grabbed;
    const r=isGrabbed?7:3;
    X.beginPath();X.arc(p.x,p.y,r,0,Math.PI*2);
    X.fillStyle=isGrabbed?`hsla(${hue},80%,80%,0.8)`:`hsla(${hue},60%,60%,0.15)`;
    if(isGrabbed){X.shadowColor=`hsla(${hue},80%,70%,0.5)`;X.shadowBlur=12}
    X.fill();X.shadowBlur=0;
  }

  // Cursor
  if(!grabbed){
    X.beginPath();X.arc(mx,my,5,0,Math.PI*2);
    X.strokeStyle=`hsla(${hue},60%,70%,0.3)`;X.lineWidth=1.5;X.stroke();
  }
}

function smoothPath(start,count,ox,oy){
  const ring=[];
  for(let i=0;i<count;i++) ring.push(pts[start+i]);
  X.moveTo(ring[0].x+ox,ring[0].y+oy);
  for(let i=0;i<count;i++){
    const curr=ring[i],next=ring[(i+1)%count];
    const cpx=(curr.x+next.x)/2+ox;
    const cpy=(curr.y+next.y)/2+oy;
    X.quadraticCurveTo(curr.x+ox,curr.y+oy,cpx,cpy);
  }
  X.closePath();
}

document.querySelectorAll('.tb').forEach(btn=>{
  btn.addEventListener('click',()=>{
    document.querySelectorAll('.tb').forEach(b=>b.classList.remove('on'));
    btn.classList.add('on');
    shape=btn.dataset.shape;
    buildShape(shape);
  });
});
document.getElementById('stiffness').addEventListener('input',function(){stiffness=+this.value});
document.getElementById('bounce').addEventListener('input',function(){bounceVal=+this.value});
document.getElementById('gravity').addEventListener('input',function(){gravityVal=+this.value});
document.getElementById('hueSlider').addEventListener('input',function(){hue=+this.value});
document.getElementById('resetBtn').addEventListener('click',()=>buildShape(shape));
document.getElementById('flingBtn').addEventListener('click',()=>{
  for(const p of pts){
    p.ox=p.x-(Math.random()-.5)*30;
    p.oy=p.y-10-Math.random()*20;
  }
});

buildShape('blob');

function loop(){
  physics();
  render();
  requestAnimationFrame(loop);
}
loop();
