<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Civilization Spark</title>
<link href="https://fonts.googleapis.com/css2?family=Newsreader:ital,wght@0,400;0,600;0,700;1,400&family=DM+Sans:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{min-height:100vh;font-family:'DM Sans',sans-serif;color:#fff;display:flex;flex-direction:column;align-items:center;justify-content:center;transition:background 1.5s;background:#0a0a10;overflow:hidden;position:relative}

/* Particle canvas */
#particles{position:fixed;inset:0;pointer-events:none;z-index:0}

.game{position:relative;z-index:1;width:100%;max-width:640px;padding:20px;display:flex;flex-direction:column;align-items:center}

/* Year display */
.year-display{
  font-family:'JetBrains Mono',monospace;
  font-size:clamp(.7rem,1.5vw,.85rem);
  color:rgba(255,255,255,.3);letter-spacing:2px;
  text-transform:uppercase;margin-bottom:6px;
}
.year-big{
  font-family:'Newsreader',serif;
  font-size:clamp(3rem,8vw,5rem);
  font-weight:700;line-height:1;
  margin-bottom:4px;
  text-shadow:0 2px 30px rgba(0,0,0,.3);
  transition:color 1s;
}
.era-name{
  font-family:'Newsreader',serif;
  font-size:clamp(.85rem,2vw,1.1rem);
  font-style:italic;color:rgba(255,255,255,.4);
  margin-bottom:20px;
}

/* Event card */
.event-card{
  background:rgba(255,255,255,.04);
  border:1px solid rgba(255,255,255,.06);
  backdrop-filter:blur(8px);
  border-radius:16px;padding:24px 28px;
  width:100%;margin-bottom:20px;
  min-height:160px;display:flex;flex-direction:column;
  align-items:center;justify-content:center;text-align:center;
  transition:all .5s;
  animation:cardIn .5s cubic-bezier(.25,.46,.45,.94);
}
@keyframes cardIn{from{opacity:0;transform:translateY(20px) scale(.95)}to{opacity:1;transform:translateY(0) scale(1)}}
.event-emoji{font-size:3rem;margin-bottom:10px;filter:drop-shadow(0 4px 12px rgba(0,0,0,.3))}
.event-title{
  font-family:'Newsreader',serif;font-size:clamp(1.1rem,2.5vw,1.5rem);
  font-weight:700;margin-bottom:8px;line-height:1.3;
}
.event-desc{
  font-size:clamp(.75rem,1.5vw,.88rem);
  color:rgba(255,255,255,.5);line-height:1.7;max-width:480px;
}

/* Progress bar */
.progress-wrap{width:100%;margin-bottom:16px}
.progress-label{display:flex;justify-content:space-between;font-size:.5rem;color:rgba(255,255,255,.2);margin-bottom:4px;font-family:'JetBrains Mono',monospace;letter-spacing:1px}
.progress-bar{width:100%;height:5px;background:rgba(255,255,255,.06);border-radius:3px;overflow:hidden}
.progress-fill{height:100%;border-radius:3px;transition:width .8s cubic-bezier(.25,.46,.45,.94);background:linear-gradient(90deg,rgba(255,255,255,.15),rgba(255,255,255,.3))}

/* The button */
.advance-btn{
  padding:16px 48px;border-radius:100px;border:none;
  background:rgba(255,255,255,.08);color:#fff;
  font-family:'DM Sans',sans-serif;font-size:.95rem;font-weight:700;
  cursor:pointer;transition:all .2s;letter-spacing:.5px;
  border:1px solid rgba(255,255,255,.08);
  position:relative;overflow:hidden;
}
.advance-btn:hover{background:rgba(255,255,255,.12);border-color:rgba(255,255,255,.15);transform:scale(1.03)}
.advance-btn:active{transform:scale(.98)}
.advance-btn:disabled{opacity:.3;cursor:default;transform:none}
.advance-btn .ripple{
  position:absolute;border-radius:50%;
  background:rgba(255,255,255,.15);
  transform:scale(0);animation:ripple .6s ease-out;
  pointer-events:none;
}
@keyframes ripple{to{transform:scale(4);opacity:0}}

.sub-hint{font-size:.55rem;color:rgba(255,255,255,.15);margin-top:10px;letter-spacing:1px}

/* Timeline dots */
.timeline{
  position:fixed;left:12px;top:50%;transform:translateY(-50%);
  display:flex;flex-direction:column;gap:3px;z-index:5;
}
.t-dot{
  width:6px;height:6px;border-radius:50%;
  background:rgba(255,255,255,.08);transition:all .3s;
  cursor:pointer;
}
.t-dot.done{background:rgba(255,255,255,.2)}
.t-dot.current{background:rgba(255,255,255,.6);box-shadow:0 0 8px rgba(255,255,255,.3);transform:scale(1.4)}
.t-dot:hover{background:rgba(255,255,255,.4)}

/* End screen */
.end{
  text-align:center;
  animation:cardIn .6s ease;
}
.end h1{font-family:'Newsreader',serif;font-size:clamp(2rem,5vw,3rem);font-weight:700;margin-bottom:8px}
.end .sub{color:rgba(255,255,255,.4);font-size:.85rem;margin-bottom:20px;line-height:1.6}
.restart-btn{
  padding:12px 36px;border-radius:100px;border:1px solid rgba(255,255,255,.12);
  background:rgba(255,255,255,.05);color:#fff;font-family:'DM Sans',sans-serif;
  font-size:.85rem;font-weight:600;cursor:pointer;transition:all .2s;
}
.restart-btn:hover{background:rgba(255,255,255,.1);transform:scale(1.03)}
</style>
</head>
<body>

<canvas id="particles"></canvas>

<div class="timeline" id="timeline"></div>

<div class="game" id="game">
  <div class="year-display" id="yearLabel">THE YEAR IS</div>
  <div class="year-big" id="yearBig">10,000 BC</div>
  <div class="era-name" id="eraName">The Dawn of Civilization</div>

  <div class="event-card" id="eventCard">
    <div class="event-emoji" id="evEmoji">🌅</div>
    <div class="event-title" id="evTitle">The Beginning</div>
    <div class="event-desc" id="evDesc">Humanity stands at the edge of history. The ice age has ended. Small bands of nomads roam the fertile crescent. Everything is about to change.</div>
  </div>

  <div class="progress-wrap">
    <div class="progress-label"><span>10,000 BC</span><span id="progPct">0%</span><span>3000 AD</span></div>
    <div class="progress-bar"><div class="progress-fill" id="progFill" style="width:0%"></div></div>
  </div>

  <button class="advance-btn" id="advBtn">Advance 200 Years →</button>
  <div class="sub-hint">click to advance through history</div>
</div>

<script>
// ═══════════════════════════════════════════════
//  50 EVENTS spanning 10,000 BC to 3000 AD
// ═══════════════════════════════════════════════
const EVENTS=[
{year:-10000,emoji:'🌅',title:'The Dawn',desc:'The last ice age ends. Humanity begins settling along rivers. Survival is all that matters.',era:'Prehistoric',bg:'#0a0a10'},
{year:-9800,emoji:'🌾',title:'First Farms',desc:'Someone plants a seed on purpose. Agriculture is born in the Fertile Crescent. Humans stop wandering.',era:'Neolithic',bg:'#0f0a08'},
{year:-9600,emoji:'🐑',title:'Animal Domestication',desc:'Goats, sheep, and cattle are tamed. Humans and animals form a partnership that will reshape the world.',era:'Neolithic',bg:'#100c08'},
{year:-9400,emoji:'🏘️',title:'First Villages',desc:'Jericho rises — one of the first permanent settlements. Walls are built. Territory is claimed.',era:'Neolithic',bg:'#0f0d0a'},
{year:-9200,emoji:'🏺',title:'Pottery Invented',desc:'Clay is shaped and fired. Food can now be stored, cooked, and carried. Civilization gets infrastructure.',era:'Neolithic',bg:'#120e0a'},
{year:-9000,emoji:'🪨',title:'Stone Tools Advance',desc:'Polished stone axes, sickles, and grinding stones. Technology accelerates for the first time.',era:'Neolithic',bg:'#100e0c'},
{year:-8800,emoji:'🌊',title:'Rising Seas',desc:'Melting glaciers flood coastlines. Entire territories vanish underwater. Humanity adapts.',era:'Neolithic',bg:'#0a0e14'},
{year:-8600,emoji:'🧱',title:'Mud Brick Construction',desc:'Sun-dried bricks transform building. Permanent structures rise from the earth. Architecture is born.',era:'Neolithic',bg:'#120e08'},
{year:-8400,emoji:'💀',title:'First Organized Religion',desc:'Göbekli Tepe is carved. Massive stone pillars arranged by hunter-gatherers. Belief precedes civilization.',era:'Neolithic',bg:'#0c0810'},
{year:-8200,emoji:'🧵',title:'Textiles Woven',desc:'Flax fibers are spun into cloth. Humans no longer rely solely on animal skins. Fashion begins.',era:'Neolithic',bg:'#0e0c0a'},
{year:-8000,emoji:'🪙',title:'Trade Networks Form',desc:'Obsidian, shells, and grain travel hundreds of miles. Trade connects distant cultures for the first time.',era:'Copper Age',bg:'#10100a'},
{year:-7600,emoji:'⚒️',title:'Copper Smelted',desc:'Metal is extracted from rock using fire. The Copper Age begins. Stronger tools, deadlier weapons.',era:'Copper Age',bg:'#12100a'},
{year:-7200,emoji:'📜',title:'Proto-Writing',desc:'Symbols scratched into clay tokens. Not yet writing, but the first attempt to record information.',era:'Copper Age',bg:'#0e0e10'},
{year:-6800,emoji:'🏛️',title:'Çatalhöyük Thrives',desc:'One of the largest Neolithic cities. Thousands live together. Art covers every wall.',era:'Copper Age',bg:'#100e0c'},
{year:-6400,emoji:'⚔️',title:'First Warfare',desc:'As resources grow scarce, organized conflict emerges. Walls aren\'t just for weather anymore.',era:'Bronze Age',bg:'#14100a'},
{year:-6000,emoji:'🔱',title:'Irrigation Invented',desc:'Canals redirect rivers to farmland. Crop yields explode. Populations boom. Cities become possible.',era:'Bronze Age',bg:'#0c1210'},
{year:-5600,emoji:'⛵',title:'Sailboats',desc:'Wind catches cloth on the Nile. Maritime trade begins. The sea is no longer a barrier.',era:'Bronze Age',bg:'#0a1018'},
{year:-5200,emoji:'🗡️',title:'Bronze Weapons',desc:'Tin and copper fused into bronze. Armies now carry metal swords and shields. Power shifts.',era:'Bronze Age',bg:'#141008'},
{year:-4800,emoji:'📐',title:'Mathematics Emerges',desc:'Sumerians count in base 60. That\'s why clocks have 60 seconds. Their math outlives their empire.',era:'Bronze Age',bg:'#0e0e14'},
{year:-4400,emoji:'✍️',title:'Writing Invented',desc:'Cuneiform pressed into clay tablets. History begins — literally. Everything before this is "pre-history."',era:'Bronze Age',bg:'#100c10'},
{year:-4000,emoji:'👑',title:'First Kings',desc:'Power concentrates. Egypt unifies. Pharaohs claim divine right. The state is born.',era:'Ancient',bg:'#14120a'},
{year:-3600,emoji:'🏗️',title:'Pyramids Rise',desc:'2.3 million stone blocks stacked perfectly. Giza\'s Great Pyramid — the first wonder of the world.',era:'Ancient',bg:'#18140a'},
{year:-3200,emoji:'⚖️',title:'Code of Laws',desc:'Hammurabi writes law into stone. "An eye for an eye." Justice becomes systematic.',era:'Ancient',bg:'#10100e'},
{year:-2800,emoji:'🏛️',title:'Greek Democracy',desc:'Athens invents government by the people. Citizens vote. Philosophy flourishes. The West takes shape.',era:'Classical',bg:'#0c0e18'},
{year:-2400,emoji:'🏟️',title:'Roman Republic',desc:'Rome builds roads, aqueducts, and an army. A republic governs. Engineering conquers geography.',era:'Classical',bg:'#12100c'},
{year:-2000,emoji:'✝️',title:'Christianity Spreads',desc:'A carpenter\'s teachings transform an empire. Religion reshapes culture, politics, and war for millennia.',era:'Classical',bg:'#0e0c14'},
{year:-1600,emoji:'🌑',title:'Fall of Rome',desc:'The Western Roman Empire crumbles. Barbarian tribes inherit the ruins. Europe enters darkness.',era:'Dark Ages',bg:'#08080c'},
{year:-1200,emoji:'☪️',title:'Islamic Golden Age',desc:'While Europe stagnates, Islamic scholars preserve and advance mathematics, medicine, and astronomy.',era:'Medieval',bg:'#0c1014'},
{year:-800,emoji:'🏰',title:'Feudal Kingdoms',desc:'Castles dot Europe. Knights and lords rule. The Church is the only unifying institution.',era:'Medieval',bg:'#0e0e0a'},
{year:-400,emoji:'🧭',title:'Age of Exploration',desc:'Compass and sextant unlock the oceans. Columbus, Magellan, Zheng He. The world map fills in.',era:'Renaissance',bg:'#0a1018'},
{year:0,emoji:'📖',title:'Printing Press',desc:'Gutenberg\'s machine turns one book into thousands. Knowledge explodes. The world will never be the same.',era:'Renaissance',bg:'#10100e'},
{year:400,emoji:'🔬',title:'Scientific Revolution',desc:'Galileo, Newton, Copernicus. The universe is measured, questioned, and understood through evidence.',era:'Enlightenment',bg:'#0c0e14'},
{year:800,emoji:'🏭',title:'Industrial Revolution',desc:'Steam engines roar. Factories replace farms. Cities swell. Humanity\'s relationship with labor changes forever.',era:'Industrial',bg:'#0e0c08'},
{year:1200,emoji:'⚡',title:'Electricity',desc:'Edison and Tesla light up the world. Night becomes optional. The modern age has truly begun.',era:'Industrial',bg:'#0c0c14'},
{year:1600,emoji:'✈️',title:'Flight & World Wars',desc:'Humans take to the sky — then use it for war. Two world wars reshape every border and belief.',era:'Modern',bg:'#100a0a'},
{year:2000,emoji:'💻',title:'Computer Age',desc:'Silicon chips process billions of calculations per second. Information becomes the most valuable resource.',era:'Information',bg:'#0a0c14'},
{year:2400,emoji:'🌐',title:'The Internet',desc:'Every human mind can now connect to every other. Knowledge, culture, and chaos flow freely.',era:'Information',bg:'#0a0e16'},
{year:2800,emoji:'📱',title:'Smartphones',desc:'A supercomputer in every pocket. More processing power than the Apollo missions. Used mostly for cat videos.',era:'Digital',bg:'#0c0e14'},
{year:3200,emoji:'🧬',title:'Gene Editing',desc:'CRISPR allows humanity to rewrite the code of life itself. Disease can be erased. The ethics lag behind.',era:'Biotech',bg:'#0a100e'},
{year:3600,emoji:'🤖',title:'Artificial Intelligence',desc:'Machines begin to think. They learn faster than any human. The question: are they conscious?',era:'AI Age',bg:'#0e0c16'},
{year:4000,emoji:'🚀',title:'Mars Colony',desc:'Humanity becomes a two-planet species. Red dust under human boots. Earth is no longer the only home.',era:'Space Age',bg:'#140a0a'},
{year:4400,emoji:'⚛️',title:'Fusion Power',desc:'Limitless clean energy from hydrogen. The energy crisis ends. Desalination makes deserts bloom.',era:'Fusion Era',bg:'#0a0e14'},
{year:4800,emoji:'🧠',title:'Neural Interfaces',desc:'Thoughts transmit directly between brains. Language becomes optional. Privacy becomes a relic.',era:'Transhuman',bg:'#100c16'},
{year:5200,emoji:'🌌',title:'Interstellar Travel',desc:'A generation ship launches toward Proxima Centauri. Humanity\'s light reaches for the nearest star.',era:'Interstellar',bg:'#08081a'},
{year:5600,emoji:'🔮',title:'Post-Scarcity',desc:'Nanofabrication and AI eliminate want. Money becomes meaningless. Humans pursue only meaning.',era:'Utopian',bg:'#0c0e18'},
{year:6000,emoji:'🌍',title:'Planetary Restoration',desc:'Earth\'s ecosystems are fully restored. Extinct species reintroduced via synthetic biology. Nature thrives.',era:'Restoration',bg:'#0a120a'},
{year:6400,emoji:'👽',title:'First Contact',desc:'A signal from 40 light-years away. Not random noise. Not natural. Someone is out there.',era:'Contact',bg:'#0a0a18'},
{year:6800,emoji:'🌐',title:'Galactic Federation',desc:'A network of civilizations spanning a thousand systems. Humanity is no longer alone — or special.',era:'Federation',bg:'#0c0c1a'},
{year:7200,emoji:'⏳',title:'Mastery of Time',desc:'Physics unlocks temporal mechanics. The past is observed, not changed. History is no longer a guess.',era:'Temporal',bg:'#0e0a18'},
{year:7600,emoji:'♾️',title:'The Singularity',desc:'Biological and artificial minds merge into something new. Humanity transcends. The story continues — but the narrator has changed.',era:'Beyond',bg:'#060614'},
];

// ═══════════════════════════════════════════════
//  STATE
// ═══════════════════════════════════════════════
let currentIdx=0;
let ended=false;

// Build timeline dots
const timelineEl=document.getElementById('timeline');
EVENTS.forEach((_,i)=>{
  const dot=document.createElement('div');
  dot.className='t-dot'+(i===0?' current':'');
  dot.id='td-'+i;
  dot.addEventListener('click',()=>{if(i<=currentIdx)goTo(i)});
  timelineEl.appendChild(dot);
});

function goTo(idx){
  currentIdx=idx;
  showEvent(idx);
  // Update dots
  document.querySelectorAll('.t-dot').forEach((d,i)=>{
    d.className='t-dot'+(i<idx?' done':'')+(i===idx?' current':'');
  });
}

function showEvent(idx){
  const ev=EVENTS[idx];
  
  // Year formatting
  let yearStr;
  if(ev.year<0){
    yearStr=Math.abs(ev.year).toLocaleString()+' BC';
  } else {
    yearStr=ev.year.toLocaleString()+' AD';
  }
  // Map internal year to display: -10000 = 10000BC, 7600 = 3000AD-ish
  const displayYear=10000+ev.year;
  const mappedYear=10000-displayYear/1.76;
  const actualYear=ev.year<=0?Math.abs(ev.year):ev.year/4; // rough mapping
  
  document.getElementById('yearBig').textContent=yearStr;
  document.getElementById('eraName').textContent=ev.era;
  
  // Animate card
  const card=document.getElementById('eventCard');
  card.style.animation='none';
  card.offsetHeight; // trigger reflow
  card.style.animation='cardIn .5s cubic-bezier(.25,.46,.45,.94)';
  
  document.getElementById('evEmoji').textContent=ev.emoji;
  document.getElementById('evTitle').textContent=ev.title;
  document.getElementById('evDesc').textContent=ev.desc;
  
  // Background
  document.body.style.background=ev.bg;
  
  // Progress
  const pct=Math.round((idx/(EVENTS.length-1))*100);
  document.getElementById('progFill').style.width=pct+'%';
  document.getElementById('progPct').textContent=pct+'%';
  
  // Button text changes over time
  const btn=document.getElementById('advBtn');
  if(idx>=EVENTS.length-1){
    btn.disabled=true;
    btn.textContent='The End';
    setTimeout(showEnd,1500);
  } else {
    btn.disabled=false;
    const gap=EVENTS[idx+1].year-ev.year;
    btn.textContent=`Advance ${gap} Years →`;
  }
  
  // Burst particles
  burstParticles(ev);
}

function showEnd(){
  ended=true;
  const game=document.getElementById('game');
  game.innerHTML=`
    <div class="end">
      <h1>♾️ You Witnessed It All</h1>
      <div class="sub">From the first campfire to the edge of infinity.<br>13,000 years in ${EVENTS.length} clicks.<br>History is just a story we tell to remember who we were.</div>
      <button class="restart-btn" onclick="location.reload()">↻ Start Again</button>
    </div>
  `;
}

// ═══════════════════════════════════════════════
//  BUTTON
// ═══════════════════════════════════════════════
document.getElementById('advBtn').addEventListener('click',function(e){
  if(currentIdx>=EVENTS.length-1)return;
  
  // Ripple effect
  const ripple=document.createElement('span');
  ripple.className='ripple';
  const rect=this.getBoundingClientRect();
  ripple.style.left=(e.clientX-rect.left)+'px';
  ripple.style.top=(e.clientY-rect.top)+'px';
  ripple.style.width=ripple.style.height='10px';
  this.appendChild(ripple);
  setTimeout(()=>ripple.remove(),600);
  
  currentIdx++;
  goTo(currentIdx);
});

// Keyboard
addEventListener('keydown',e=>{
  if((e.code==='Space'||e.code==='ArrowRight')&&!ended){
    e.preventDefault();
    document.getElementById('advBtn').click();
  }
  if(e.code==='ArrowLeft'&&currentIdx>0){
    currentIdx--;goTo(currentIdx);
  }
});

// ═══════════════════════════════════════════════
//  PARTICLES
// ═══════════════════════════════════════════════
const PC=document.getElementById('particles'),PX=PC.getContext('2d');
let pW,pH;
function pResize(){pW=PC.width=innerWidth;pH=PC.height=innerHeight}
pResize();addEventListener('resize',pResize);

let parts=[];

function burstParticles(ev){
  const cx=pW/2,cy=pH/2;
  for(let i=0;i<15;i++){
    const a=Math.random()*Math.PI*2,s=1+Math.random()*3;
    parts.push({
      x:cx+(Math.random()-.5)*100,y:cy+(Math.random()-.5)*50,
      vx:Math.cos(a)*s,vy:Math.sin(a)*s,
      life:1,size:2+Math.random()*3,
      color:`rgba(255,255,255,`,
    });
  }
}

// Ambient floating particles
for(let i=0;i<30;i++){
  parts.push({
    x:Math.random()*2000,y:Math.random()*2000,
    vx:(Math.random()-.5)*0.3,vy:-Math.random()*0.3-0.1,
    life:2,size:1+Math.random()*1.5,
    color:'rgba(255,255,255,',
    ambient:true,
  });
}

function drawParticles(){
  PX.clearRect(0,0,pW,pH);
  for(let i=parts.length-1;i>=0;i--){
    const p=parts[i];
    p.x+=p.vx;p.y+=p.vy;
    
    if(p.ambient){
      // Wrap around
      if(p.y<-10)p.y=pH+10;
      if(p.x<-10)p.x=pW+10;
      if(p.x>pW+10)p.x=-10;
      p.life=2; // permanent
    } else {
      p.life-=0.015;
      if(p.life<=0){parts.splice(i,1);continue}
    }
    
    PX.beginPath();PX.arc(p.x%pW,p.y%pH,p.size*(p.ambient?1:p.life),0,Math.PI*2);
    PX.fillStyle=p.color+(p.ambient?0.06:p.life*0.3)+')';
    PX.fill();
  }
  requestAnimationFrame(drawParticles);
}
drawParticles();
</script>
</body>
</html>
