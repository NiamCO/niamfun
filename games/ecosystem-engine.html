<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ecosystem Engine</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{background:#1a2e1a;overflow:hidden;height:100vh;font-family:'DM Sans',sans-serif;user-select:none;display:flex;flex-direction:column}
canvas{flex:1;display:block;cursor:crosshair}

/* Top bar */
.top{
  display:flex;align-items:center;justify-content:space-between;
  background:rgba(10,18,10,.9);backdrop-filter:blur(8px);
  border-bottom:1px solid rgba(255,255,255,.06);
  padding:6px 14px;z-index:10;flex-shrink:0;
}
.top-left{display:flex;align-items:center;gap:12px}
.title{font-size:.9rem;font-weight:700;color:#8bc34a;display:flex;align-items:center;gap:5px}
.title .ico{font-size:1.1rem}

/* Entity counters */
.counters{display:flex;gap:8px}
.counter{
  display:flex;align-items:center;gap:5px;
  background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.06);
  border-radius:8px;padding:4px 10px;
}
.counter .dot{width:10px;height:10px;border-radius:50%}
.counter .val{font-family:'JetBrains Mono',monospace;font-size:.72rem;font-weight:600;color:#fff}
.counter .lbl{font-size:.5rem;color:rgba(255,255,255,.35);text-transform:uppercase;letter-spacing:.8px}

/* Tools */
.tools{display:flex;gap:3px}
.tool{
  display:flex;flex-direction:column;align-items:center;gap:1px;
  padding:5px 10px;border-radius:7px;border:1px solid transparent;
  background:none;color:rgba(255,255,255,.35);cursor:pointer;
  font-family:'DM Sans',sans-serif;font-size:.48rem;font-weight:600;
  text-transform:uppercase;letter-spacing:.5px;transition:all .1s;
}
.tool:hover{color:#fff;background:rgba(255,255,255,.04)}
.tool.on{color:#fff;border-color:rgba(139,195,74,.4);background:rgba(139,195,74,.08)}
.tool .tico{font-size:1rem}

/* Bottom controls */
.bot{
  display:flex;align-items:center;justify-content:space-between;
  background:rgba(10,18,10,.9);backdrop-filter:blur(8px);
  border-top:1px solid rgba(255,255,255,.06);
  padding:5px 14px;z-index:10;flex-shrink:0;
  font-size:.6rem;color:rgba(255,255,255,.3);
}
.bot-left,.bot-right{display:flex;align-items:center;gap:10px}
.bot label{display:flex;align-items:center;gap:4px}
.bot input[type=range]{width:55px;-webkit-appearance:none;height:3px;background:rgba(255,255,255,.1);border-radius:2px;outline:none}
.bot input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:10px;height:10px;border-radius:50%;background:#8bc34a;cursor:pointer}
.bot-btn{
  padding:3px 9px;border-radius:5px;border:1px solid rgba(255,255,255,.08);
  background:none;color:rgba(255,255,255,.35);cursor:pointer;
  font-family:'DM Sans',sans-serif;font-size:.55rem;font-weight:600;transition:all .1s;
}
.bot-btn:hover{color:#fff;border-color:rgba(255,255,255,.2)}
.bot-btn.danger:hover{color:#f44;border-color:rgba(255,68,68,.3)}
.stat{font-family:'JetBrains Mono',monospace;color:#8bc34a}
</style>
</head>
<body>

<div class="top">
  <div class="top-left">
    <div class="title"><span class="ico">🌿</span>Ecosystem Engine</div>
    <div class="counters">
      <div class="counter"><div class="dot" style="background:#4caf50"></div><div><div class="val" id="cPlant">0</div><div class="lbl">Plants</div></div></div>
      <div class="counter"><div class="dot" style="background:#fff"></div><div><div class="val" id="cRabbit">0</div><div class="lbl">Rabbits</div></div></div>
      <div class="counter"><div class="dot" style="background:#ff8800"></div><div><div class="val" id="cFox">0</div><div class="lbl">Foxes</div></div></div>
      <div class="counter"><div class="dot" style="background:#44aaff"></div><div><div class="val" id="cWater">0</div><div class="lbl">Water</div></div></div>
    </div>
  </div>
  <div class="tools" id="tools">
    <button class="tool on" data-t="plant"><span class="tico">🌱</span>Plant</button>
    <button class="tool" data-t="tree"><span class="tico">🌳</span>Tree</button>
    <button class="tool" data-t="rabbit"><span class="tico">🐇</span>Rabbit</button>
    <button class="tool" data-t="fox"><span class="tico">🦊</span>Fox</button>
    <button class="tool" data-t="wolf"><span class="tico">🐺</span>Wolf</button>
    <button class="tool" data-t="bear"><span class="tico">🐻</span>Bear</button>
    <button class="tool" data-t="deer"><span class="tico">🦌</span>Deer</button>
    <button class="tool" data-t="bird"><span class="tico">🐦</span>Bird</button>
    <button class="tool" data-t="fish"><span class="tico">🐟</span>Fish</button>
    <button class="tool" data-t="rock"><span class="tico">🪨</span>Rock</button>
    <button class="tool" data-t="water"><span class="tico">💧</span>Water</button>
    <button class="tool" data-t="rain"><span class="tico">🌧️</span>Rain</button>
    <button class="tool" data-t="fire"><span class="tico">🔥</span>Fire</button>
    <button class="tool" data-t="lightning"><span class="tico">⚡</span>Bolt</button>
  </div>
</div>

<canvas id="c"></canvas>

<div class="bot">
  <div class="bot-left">
    <label>Speed <input type="range" id="speedSlider" min="1" max="5" value="2"> <span id="speedVal">2×</span></label>
    <label>Brush <input type="range" id="brushSlider" min="1" max="8" value="3"> <span id="brushVal">3</span></label>
    <span>Entities: <span class="stat" id="totalCount">0</span></span>
    <span>Time: <span class="stat" id="timeVal">0:00</span></span>
  </div>
  <div class="bot-right">
    <button class="bot-btn" id="pauseBtn">⏸ Pause</button>
    <button class="bot-btn danger" id="clearBtn">🗑 Clear</button>
  </div>
</div>

<script>
const C=document.getElementById('c'),X=C.getContext('2d');
let W,H;
function resize(){
  const t=document.querySelector('.top').offsetHeight;
  const b=document.querySelector('.bot').offsetHeight;
  W=C.width=innerWidth;H=C.height=innerHeight-t-b;
}
resize();addEventListener('resize',resize);

// ═══════════════════════════════════════════════
//  ENTITY TYPES
// ═══════════════════════════════════════════════
let entities=[];
let waters=[];  // water tiles
let fires=[];   // fire particles
let rainDrops=[];
let selected='plant';
let speed=2;
let brushSize=3;
let paused=false;
let gameTime=0;
let idC=0;

const FOOD_CHAIN={
  rabbit:{eats:['plant'],flees:['fox','wolf','bear'],speed:2.2,size:6,color:'#f5f5f0',energy:100,maxEnergy:150,reproduce:120,sight:100},
  fox:   {eats:['rabbit','bird','fish'],flees:['wolf','bear'],speed:2.5,size:8,color:'#e87720',energy:120,maxEnergy:200,reproduce:180,sight:140},
  wolf:  {eats:['rabbit','fox','deer'],flees:['bear'],speed:2.8,size:10,color:'#666',energy:150,maxEnergy:250,reproduce:220,sight:160},
  bear:  {eats:['rabbit','fox','deer','fish'],flees:[],speed:1.8,size:14,color:'#6d4c30',energy:200,maxEnergy:350,reproduce:300,sight:120},
  deer:  {eats:['plant'],flees:['wolf','bear','fox'],speed:2.6,size:9,color:'#b8860b',energy:100,maxEnergy:160,reproduce:140,sight:120},
  bird:  {eats:['plant','fish'],flees:['fox','wolf'],speed:3.5,size:5,color:'#4488cc',energy:60,maxEnergy:100,reproduce:90,sight:130,flies:true},
  fish:  {eats:['plant'],flees:['bird','bear'],speed:2,size:5,color:'#55aadd',energy:70,maxEnergy:100,reproduce:80,sight:60,aquatic:true},
};

class Entity{
  constructor(type,x,y){
    this.id=++idC;
    this.type=type;
    this.x=x;this.y=y;
    this.vx=0;this.vy=0;
    this.angle=Math.random()*Math.PI*2;
    this.alive=true;
    this.age=0;
    
    if(type==='plant'){
      this.size=3+Math.random()*3;
      this.energy=50+Math.random()*30;
      this.maxEnergy=80;
      this.grown=false;
      this.growTimer=60+Math.random()*60;
      this.color=`hsl(${110+Math.random()*30},${60+Math.random()*20}%,${25+Math.random()*15}%)`;
    } else if(type==='tree'){
      this.size=18+Math.random()*8;
      this.energy=300;
      this.maxEnergy=300;
      this.color=`hsl(${120+Math.random()*20},${50+Math.random()*20}%,${20+Math.random()*10}%)`;
      this.leafColor=`hsl(${100+Math.random()*40},${50+Math.random()*30}%,${30+Math.random()*20}%)`;
    } else if(type==='rock'){
      this.size=10+Math.random()*10;
      this.energy=9999;this.maxEnergy=9999;
      this.color=`hsl(0,0%,${30+Math.random()*20}%)`;
    } else {
      const cfg=FOOD_CHAIN[type];
      this.size=cfg.size;
      this.energy=cfg.energy;
      this.maxEnergy=cfg.maxEnergy;
      this.speed=cfg.speed;
      this.sight=cfg.sight;
      this.color=cfg.color;
      this.reproduceTimer=cfg.reproduce+Math.random()*60;
      this.huntCooldown=0;
      this.wanderAngle=Math.random()*Math.PI*2;
      this.wanderTimer=0;
      this.state='wander'; // wander, chase, flee, eat
      this.target=null;
    }
    this.burning=false;
    this.burnTimer=0;
  }
}

// ═══════════════════════════════════════════════
//  AI BEHAVIOR
// ═══════════════════════════════════════════════
function updateCreature(e){
  const cfg=FOOD_CHAIN[e.type];
  if(!cfg)return;
  
  e.age++;
  e.energy-=0.08*speed; // hunger
  if(e.huntCooldown>0)e.huntCooldown--;
  
  // Die of starvation
  if(e.energy<=0){e.alive=false;return}
  
  // Fish needs water
  if(cfg.aquatic){
    const inWater=waters.some(w=>Math.hypot(w.x-e.x,w.y-e.y)<w.r+5);
    if(!inWater){e.energy-=0.5;if(e.energy<=0){e.alive=false;return}}
  }
  
  // ─── PERCEPTION ───
  let nearestFood=null,nearestFoodDist=Infinity;
  let nearestThreat=null,nearestThreatDist=Infinity;
  
  for(const o of entities){
    if(!o.alive||o.id===e.id)continue;
    const d=Math.hypot(o.x-e.x,o.y-e.y);
    if(d>e.sight)continue;
    
    // Food?
    if(cfg.eats.includes(o.type)&&d<nearestFoodDist){
      nearestFood=o;nearestFoodDist=d;
    }
    // Threat?
    if(cfg.flees.includes(o.type)&&d<nearestThreatDist){
      nearestThreat=o;nearestThreatDist=d;
    }
  }
  
  // ─── DECISION ───
  let tx=e.x,ty=e.y;
  
  if(nearestThreat&&nearestThreatDist<e.sight*0.8){
    // FLEE - run away from threat
    e.state='flee';
    const dx=e.x-nearestThreat.x,dy=e.y-nearestThreat.y;
    const d=Math.hypot(dx,dy)||1;
    tx=e.x+dx/d*50;ty=e.y+dy/d*50;
  } else if(nearestFood&&e.energy<e.maxEnergy*0.8){
    // CHASE food
    e.state='chase';
    tx=nearestFood.x;ty=nearestFood.y;
    
    // Close enough to eat?
    if(nearestFoodDist<e.size+nearestFood.size&&e.huntCooldown<=0){
      e.state='eat';
      const gain=nearestFood.type==='plant'?25:nearestFood.energy*0.5;
      e.energy=Math.min(e.maxEnergy,e.energy+gain);
      nearestFood.energy-=gain;
      if(nearestFood.energy<=0)nearestFood.alive=false;
      e.huntCooldown=20;
    }
  } else {
    // WANDER
    e.state='wander';
    e.wanderTimer--;
    if(e.wanderTimer<=0){
      e.wanderAngle+=((Math.random()-.5)*1.5);
      e.wanderTimer=30+Math.random()*60;
    }
    tx=e.x+Math.cos(e.wanderAngle)*30;
    ty=e.y+Math.sin(e.wanderAngle)*30;
  }
  
  // ─── MOVEMENT ───
  const dx=tx-e.x,dy=ty-e.y;
  const d=Math.hypot(dx,dy)||1;
  const spd=e.speed*(e.state==='flee'?1.4:e.state==='chase'?1.1:0.5)*speed*0.5;
  
  if(d>2){
    e.vx+=(dx/d*spd-e.vx)*0.15;
    e.vy+=(dy/d*spd-e.vy)*0.15;
    e.angle=Math.atan2(e.vy,e.vx);
  }
  
  // Avoid rocks
  for(const o of entities){
    if(o.type!=='rock'&&o.type!=='tree')continue;
    const rd=Math.hypot(o.x-e.x,o.y-e.y);
    if(rd<o.size+e.size+5&&rd>0){
      e.vx+=(e.x-o.x)/rd*2;
      e.vy+=(e.y-o.y)/rd*2;
    }
  }
  
  // Birds fly (ignore some obstacles, hover)
  if(cfg.flies){
    e.vy+=(Math.sin(e.age*0.05))*0.1;
  }
  
  e.x+=e.vx;e.y+=e.vy;
  e.vx*=0.9;e.vy*=0.9;
  
  // Bounds
  e.x=Math.max(e.size,Math.min(W-e.size,e.x));
  e.y=Math.max(e.size,Math.min(H-e.size,e.y));
  
  // ─── REPRODUCTION ───
  e.reproduceTimer-=speed*0.5;
  if(e.reproduceTimer<=0&&e.energy>e.maxEnergy*0.6&&entities.length<600){
    // Find nearby mate
    const mate=entities.find(o=>o.alive&&o.type===e.type&&o.id!==e.id&&Math.hypot(o.x-e.x,o.y-e.y)<40);
    if(mate){
      const baby=new Entity(e.type,
        (e.x+mate.x)/2+(Math.random()-.5)*20,
        (e.y+mate.y)/2+(Math.random()-.5)*20
      );
      baby.energy=cfg.energy*0.5;
      entities.push(baby);
      e.energy-=cfg.energy*0.3;
      mate.energy-=cfg.energy*0.3;
    }
    e.reproduceTimer=cfg.reproduce+Math.random()*60;
  }
}

// ═══════════════════════════════════════════════
//  PLANT LOGIC
// ═══════════════════════════════════════════════
function updatePlant(e){
  e.age++;
  // Grow
  if(!e.grown){
    e.growTimer-=speed;
    if(e.growTimer<=0){e.grown=true;e.size=Math.min(e.size+2,8)}
  }
  // Spread near water
  if(e.grown&&e.age%(Math.floor(200/speed))===0&&Math.random()<0.15&&entities.length<800){
    const nearWater=waters.some(w=>Math.hypot(w.x-e.x,w.y-e.y)<80);
    if(nearWater||Math.random()<0.03){
      const nx=e.x+(Math.random()-.5)*50;
      const ny=e.y+(Math.random()-.5)*50;
      if(nx>5&&nx<W-5&&ny>5&&ny<H-5){
        entities.push(new Entity('plant',nx,ny));
      }
    }
  }
}

// ═══════════════════════════════════════════════
//  FIRE LOGIC
// ═══════════════════════════════════════════════
function updateFires(){
  for(let i=fires.length-1;i>=0;i--){
    const f=fires[i];
    f.life-=speed;
    f.y-=0.5*speed;
    f.x+=(Math.random()-.5)*2;
    f.size*=0.99;
    
    if(f.life<=0){fires.splice(i,1);continue}
    
    // Spread to nearby entities
    for(const e of entities){
      if(!e.alive||e.type==='rock'||e.type==='water'||e.burning)continue;
      if(Math.hypot(e.x-f.x,e.y-f.y)<e.size+f.size){
        e.burning=true;
        e.burnTimer=80+Math.random()*60;
      }
    }
    
    // Random spread
    if(Math.random()<0.02*speed){
      fires.push({x:f.x+(Math.random()-.5)*20,y:f.y+(Math.random()-.5)*10,size:4+Math.random()*4,life:40+Math.random()*30});
    }
  }
  
  // Burning entities
  for(const e of entities){
    if(!e.burning)continue;
    e.burnTimer-=speed;
    e.energy-=2*speed;
    // Emit fire
    if(Math.random()<0.1*speed){
      fires.push({x:e.x+(Math.random()-.5)*e.size,y:e.y-e.size*0.5,size:3+Math.random()*3,life:20+Math.random()*20});
    }
    if(e.burnTimer<=0||e.energy<=0)e.alive=false;
  }
}

// ═══════════════════════════════════════════════
//  RAIN
// ═══════════════════════════════════════════════
function updateRain(){
  for(let i=rainDrops.length-1;i>=0;i--){
    const r=rainDrops[i];
    r.y+=6*speed;
    if(r.y>H){
      // Create water puddle
      waters.push({x:r.x,y:H-2,r:8+Math.random()*6,life:600+Math.random()*300});
      rainDrops.splice(i,1);
      // Extinguish nearby fires
      fires=fires.filter(f=>Math.hypot(f.x-r.x,f.y-H)>15);
    }
  }
  // Water evaporates
  for(let i=waters.length-1;i>=0;i--){
    waters[i].life-=speed*0.1;
    if(waters[i].life<=0)waters.splice(i,1);
  }
}

// ═══════════════════════════════════════════════
//  MAIN UPDATE
// ═══════════════════════════════════════════════
function update(){
  if(paused)return;
  gameTime+=1/60*speed;
  
  for(const e of entities){
    if(!e.alive)continue;
    if(e.type==='plant'||e.type==='tree')updatePlant(e);
    else if(e.type!=='rock')updateCreature(e);
  }
  
  updateFires();
  updateRain();
  
  // Remove dead
  entities=entities.filter(e=>e.alive);
  
  // Update counters
  const counts={plant:0,rabbit:0,fox:0};
  entities.forEach(e=>{if(counts[e.type]!==undefined)counts[e.type]++});
  document.getElementById('cPlant').textContent=entities.filter(e=>e.type==='plant'||e.type==='tree').length;
  document.getElementById('cRabbit').textContent=entities.filter(e=>e.type==='rabbit'||e.type==='deer').length;
  document.getElementById('cFox').textContent=entities.filter(e=>e.type==='fox'||e.type==='wolf'||e.type==='bear').length;
  document.getElementById('cWater').textContent=waters.length;
  document.getElementById('totalCount').textContent=entities.length;
  const m=Math.floor(gameTime/60),s=Math.floor(gameTime%60);
  document.getElementById('timeVal').textContent=m+':'+(s<10?'0':'')+s;
}

// ═══════════════════════════════════════════════
//  RENDER
// ═══════════════════════════════════════════════
function render(){
  // Sky gradient
  X.fillStyle='#1a2e1a';
  X.fillRect(0,0,W,H);
  
  // Grass texture
  X.save();
  for(let i=0;i<200;i++){
    const gx=(i*37+gameTime*0.3)%(W+20)-10;
    const gy=(i*53)%H;
    X.strokeStyle=`rgba(40,80,30,${0.15+Math.random()*0.1})`;
    X.lineWidth=1;
    X.beginPath();X.moveTo(gx,gy);X.lineTo(gx+(Math.random()-.5)*4,gy-4-Math.random()*6);X.stroke();
  }
  X.restore();
  
  // Water puddles
  waters.forEach(w=>{
    const alpha=Math.min(1,w.life/100)*0.5;
    const grd=X.createRadialGradient(w.x,w.y,0,w.x,w.y,w.r);
    grd.addColorStop(0,`rgba(30,100,200,${alpha})`);
    grd.addColorStop(1,`rgba(20,60,140,${alpha*0.3})`);
    X.fillStyle=grd;
    X.beginPath();X.ellipse(w.x,w.y,w.r,w.r*0.6,0,0,Math.PI*2);X.fill();
    // Shine
    X.beginPath();X.ellipse(w.x-w.r*0.2,w.y-w.r*0.15,w.r*0.3,w.r*0.15,0,0,Math.PI*2);
    X.fillStyle=`rgba(100,180,255,${alpha*0.3})`;X.fill();
  });
  
  // Sort entities by Y for depth
  const sorted=[...entities].sort((a,b)=>a.y-b.y);
  
  for(const e of sorted){
    if(!e.alive)continue;
    X.save();
    X.translate(e.x,e.y);
    
    if(e.type==='plant'){
      // Stem
      X.strokeStyle='#2d6b1e';X.lineWidth=2;
      X.beginPath();X.moveTo(0,0);X.lineTo(0,-e.size*1.5);X.stroke();
      // Leaves
      X.fillStyle=e.color;
      X.beginPath();X.arc(0,-e.size*1.5,e.size*(e.grown?1:.6),0,Math.PI*2);X.fill();
      if(e.grown){
        X.beginPath();X.arc(-e.size*0.7,-e.size,e.size*0.5,0,Math.PI*2);X.fill();
        X.beginPath();X.arc(e.size*0.7,-e.size,e.size*0.5,0,Math.PI*2);X.fill();
      }
    } else if(e.type==='tree'){
      // Trunk
      X.fillStyle='#4a3520';
      X.fillRect(-4,0,8,-e.size*0.7);
      // Canopy
      X.fillStyle=e.leafColor;
      X.beginPath();X.arc(0,-e.size*0.7,e.size*0.6,0,Math.PI*2);X.fill();
      X.beginPath();X.arc(-e.size*0.3,-e.size*0.5,e.size*0.4,0,Math.PI*2);X.fill();
      X.beginPath();X.arc(e.size*0.3,-e.size*0.5,e.size*0.4,0,Math.PI*2);X.fill();
    } else if(e.type==='rock'){
      X.fillStyle=e.color;
      X.beginPath();
      X.moveTo(-e.size*0.8,0);
      X.lineTo(-e.size*0.5,-e.size*0.6);
      X.lineTo(e.size*0.3,-e.size*0.7);
      X.lineTo(e.size*0.8,-e.size*0.1);
      X.lineTo(e.size*0.5,e.size*0.1);
      X.closePath();X.fill();
      X.strokeStyle='rgba(255,255,255,.08)';X.lineWidth=1;X.stroke();
    } else {
      // Animals
      const cfg=FOOD_CHAIN[e.type];
      if(!cfg){X.restore();continue}
      const facing=e.vx>0.1?1:e.vx<-0.1?-1:1;
      X.scale(facing,1);
      
      // Shadow
      X.fillStyle='rgba(0,0,0,.15)';
      X.beginPath();X.ellipse(0,e.size*0.2,e.size*0.8,e.size*0.2,0,0,Math.PI*2);X.fill();
      
      // Body
      const bounce=Math.abs(Math.sin(e.age*0.15))*2*(Math.abs(e.vx)+Math.abs(e.vy)>0.5?1:0);
      X.translate(0,-bounce);
      
      // Body oval
      X.fillStyle=e.burning?`hsl(${20+Math.random()*20},80%,50%)`:e.color;
      X.beginPath();X.ellipse(0,0,e.size,e.size*0.65,0,0,Math.PI*2);X.fill();
      
      // Head
      const headX=e.size*0.7;
      const headR=e.size*0.45;
      X.beginPath();X.arc(headX,-e.size*0.15,headR,0,Math.PI*2);X.fill();
      
      // Eye
      X.fillStyle='#fff';
      X.beginPath();X.arc(headX+headR*0.3,-headR*0.3,headR*0.25,0,Math.PI*2);X.fill();
      X.fillStyle='#111';
      X.beginPath();X.arc(headX+headR*0.4,-headR*0.3,headR*0.12,0,Math.PI*2);X.fill();
      
      // Ears for rabbits/foxes/wolves
      if(e.type==='rabbit'||e.type==='fox'||e.type==='wolf'||e.type==='deer'){
        X.fillStyle=e.color;
        X.beginPath();X.ellipse(headX-headR*0.2,-headR*1.3,headR*0.2,headR*0.5,-.2,0,Math.PI*2);X.fill();
        X.beginPath();X.ellipse(headX+headR*0.2,-headR*1.3,headR*0.2,headR*0.5,.2,0,Math.PI*2);X.fill();
      }
      
      // Tail for fox/wolf
      if(e.type==='fox'||e.type==='wolf'){
        X.fillStyle=e.type==='fox'?'#fff':e.color;
        const tw=Math.sin(e.age*0.1)*3;
        X.beginPath();X.moveTo(-e.size,0);
        X.quadraticCurveTo(-e.size*1.3+tw,-e.size*0.5,-e.size*1.5+tw,-e.size*0.2);
        X.lineWidth=3;X.strokeStyle=e.type==='fox'?'#fff':e.color;X.stroke();
      }
      
      // Wings for birds
      if(cfg.flies){
        const wing=Math.sin(e.age*0.3)*4;
        X.strokeStyle=e.color;X.lineWidth=2;
        X.beginPath();X.moveTo(0,0);X.lineTo(-e.size*0.8,-e.size-wing);X.stroke();
        X.beginPath();X.moveTo(0,0);X.lineTo(e.size*0.5,-e.size-wing*0.8);X.stroke();
      }
      
      // Energy bar
      if(e.energy<e.maxEnergy*0.5){
        const pct=e.energy/e.maxEnergy;
        X.fillStyle='rgba(0,0,0,.3)';
        X.fillRect(-e.size,-e.size*1.3,e.size*2,3);
        X.fillStyle=pct<0.25?'#f44':'#fbbf24';
        X.fillRect(-e.size,-e.size*1.3,e.size*2*pct,3);
      }
      
      // State indicator
      if(e.state==='flee'){
        X.fillStyle='rgba(255,50,50,.6)';X.font='bold 8px sans-serif';
        X.fillText('!',headX+headR,headR*-1.5);
      }
    }
    
    // Burning overlay
    if(e.burning){
      X.globalAlpha=0.5+Math.random()*0.3;
      X.fillStyle='#ff4400';
      X.beginPath();X.arc(0,-e.size*0.3,e.size*0.8,0,Math.PI*2);X.fill();
      X.globalAlpha=1;
    }
    
    X.restore();
  }
  
  // Fire particles
  fires.forEach(f=>{
    const alpha=Math.min(1,f.life/20);
    const grd=X.createRadialGradient(f.x,f.y,0,f.x,f.y,f.size);
    grd.addColorStop(0,`rgba(255,200,50,${alpha})`);
    grd.addColorStop(0.5,`rgba(255,100,0,${alpha*0.7})`);
    grd.addColorStop(1,`rgba(200,0,0,0)`);
    X.fillStyle=grd;
    X.beginPath();X.arc(f.x,f.y,f.size,0,Math.PI*2);X.fill();
  });
  
  // Rain
  X.strokeStyle='rgba(100,180,255,.4)';X.lineWidth=1;
  rainDrops.forEach(r=>{
    X.beginPath();X.moveTo(r.x,r.y);X.lineTo(r.x-1,r.y+8);X.stroke();
  });
}

// ═══════════════════════════════════════════════
//  INPUT
// ═══════════════════════════════════════════════
let mouseDown=false,mx=0,my=0;

C.addEventListener('mousedown',e=>{mouseDown=true;mx=e.offsetX;my=e.offsetY;doPlace()});
C.addEventListener('mousemove',e=>{mx=e.offsetX;my=e.offsetY;if(mouseDown)doPlace()});
C.addEventListener('mouseup',()=>mouseDown=false);
C.addEventListener('touchstart',e=>{e.preventDefault();mouseDown=true;const t=e.touches[0],r=C.getBoundingClientRect();mx=t.clientX-r.left;my=t.clientY-r.top;doPlace()},{passive:false});
C.addEventListener('touchmove',e=>{e.preventDefault();const t=e.touches[0],r=C.getBoundingClientRect();mx=t.clientX-r.left;my=t.clientY-r.top;if(mouseDown)doPlace()},{passive:false});
C.addEventListener('touchend',()=>mouseDown=false);

function doPlace(){
  for(let i=0;i<brushSize;i++){
    const ox=(Math.random()-.5)*brushSize*8;
    const oy=(Math.random()-.5)*brushSize*8;
    const px=mx+ox,py=my+oy;
    
    if(selected==='rain'){
      for(let j=0;j<3;j++){
        rainDrops.push({x:px+(Math.random()-.5)*40,y:0});
      }
    } else if(selected==='fire'){
      fires.push({x:px,y:py,size:5+Math.random()*5,life:60+Math.random()*40});
    } else if(selected==='lightning'){
      // Lightning bolt - starts fire and kills nearby
      fires.push({x:px,y:py,size:10,life:30});
      entities.forEach(e=>{
        if(Math.hypot(e.x-px,e.y-py)<30){
          e.burning=true;e.burnTimer=40;
        }
      });
    } else if(selected==='water'){
      waters.push({x:px,y:py,r:10+Math.random()*8,life:800+Math.random()*400});
    } else if(entities.length<800){
      entities.push(new Entity(selected,px,py));
    }
  }
}

// Tool selection
document.querySelectorAll('.tool').forEach(btn=>{
  btn.addEventListener('click',()=>{
    document.querySelectorAll('.tool').forEach(b=>b.classList.remove('on'));
    btn.classList.add('on');
    selected=btn.dataset.t;
  });
});

// Controls
document.getElementById('speedSlider').addEventListener('input',function(){
  speed=+this.value;
  document.getElementById('speedVal').textContent=speed+'×';
});
document.getElementById('brushSlider').addEventListener('input',function(){
  brushSize=+this.value;
  document.getElementById('brushVal').textContent=this.value;
});
document.getElementById('pauseBtn').addEventListener('click',function(){
  paused=!paused;
  this.textContent=paused?'▶ Play':'⏸ Pause';
});
document.getElementById('clearBtn').addEventListener('click',()=>{
  entities=[];waters=[];fires=[];rainDrops=[];
});

// ═══════════════════════════════════════════════
//  LOOP
// ═══════════════════════════════════════════════
function loop(){
  update();render();
  requestAnimationFrame(loop);
}
loop();
</script>
