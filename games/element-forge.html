<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Element Forge</title>
<link href="https://fonts.googleapis.com/css2?family=Newsreader:ital,wght@0,400;0,600;1,400&family=DM+Sans:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#0c0c10;--panel:#15151c;--panel2:#1c1c26;--border:#262633;--border2:#35354a;--accent:#7dd3fc;--accent2:#a78bfa;--text:#e4e4ec;--dim:#5e5e72;--gold:#fbbf24;--green:#4ade80}
html,body{height:100%;overflow:hidden;background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;user-select:none}
.app{display:flex;height:100vh}

/* WORKSPACE */
.workspace{flex:1;position:relative;overflow:hidden}
#starCvs{position:absolute;inset:0;pointer-events:none;z-index:0}

/* SIDEBAR */
.sidebar{width:290px;min-width:290px;background:var(--panel);border-left:1px solid var(--border);display:flex;flex-direction:column;z-index:20}
.sb-head{padding:10px 14px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between}
.brand{font-family:'Newsreader',serif;font-size:1.4rem;font-weight:600;display:flex;align-items:baseline;gap:2px}
.brand i{font-style:italic;font-weight:400;color:var(--accent)}
.pill-count{font-family:'JetBrains Mono',monospace;font-size:.68rem;color:var(--dim);background:var(--panel2);padding:3px 9px;border-radius:6px;border:1px solid var(--border)}
.sb-search{padding:7px 12px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:7px}
.sb-search svg{width:14px;height:14px;color:var(--dim);flex-shrink:0}
.sb-search input{flex:1;background:none;border:none;color:var(--text);font-family:'DM Sans',sans-serif;font-size:.8rem;outline:none}
.sb-search input::placeholder{color:var(--dim)}
.sort-row{padding:5px 10px;border-bottom:1px solid var(--border);display:flex;gap:3px}
.sort-b{padding:3px 9px;border-radius:5px;border:1px solid transparent;background:none;color:var(--dim);font-family:'DM Sans',sans-serif;font-size:.58rem;font-weight:600;text-transform:uppercase;letter-spacing:.7px;cursor:pointer;transition:all .12s}
.sort-b:hover{color:var(--text)}
.sort-b.on{color:var(--accent);border-color:rgba(125,211,252,.2);background:rgba(125,211,252,.05)}

/* Element list */
.el-list{flex:1;overflow-y:auto;padding:5px 7px;display:flex;flex-wrap:wrap;align-content:flex-start;gap:4px}
.el-list::-webkit-scrollbar{width:3px}
.el-list::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}
.el-chip{
  display:inline-flex;align-items:center;gap:5px;
  padding:6px 12px 6px 9px;border-radius:7px;
  background:var(--panel2);border:1px solid var(--border);
  font-size:.76rem;font-weight:500;cursor:grab;
  transition:transform .1s,border-color .1s,box-shadow .1s;
  white-space:nowrap;
}
.el-chip:hover{border-color:var(--border2);transform:translateY(-1px);box-shadow:0 3px 10px rgba(0,0,0,.25)}
.el-chip .em{font-size:.95rem}
.el-chip.is-first{border-color:rgba(251,191,36,.25);background:rgba(251,191,36,.04)}
.el-chip.is-first::after{content:'✦ First';position:absolute;top:-8px;right:-4px;font-size:.42rem;color:var(--gold);font-weight:700;letter-spacing:.5px;background:var(--panel);padding:1px 4px;border-radius:3px;border:1px solid rgba(251,191,36,.2)}
.el-chip{position:relative}

/* Bottom bar */
.bb{border-top:1px solid var(--border);padding:6px 8px;display:flex;gap:4px;justify-content:space-between;align-items:center}
.bb-btn{display:flex;align-items:center;gap:4px;padding:5px 10px;border-radius:7px;background:var(--panel2);border:1px solid var(--border);color:var(--dim);font-family:'DM Sans',sans-serif;font-size:.64rem;font-weight:600;cursor:pointer;transition:all .12s}
.bb-btn:hover{color:var(--text);border-color:var(--border2)}
.bb-btn .ic{font-size:.8rem}

/* WORKSPACE ELEMENTS */
.w-el{
  position:absolute;z-index:5;display:flex;align-items:center;gap:6px;
  padding:8px 14px 8px 10px;border-radius:9px;
  background:var(--panel);border:1px solid var(--border);
  font-size:.84rem;font-weight:600;cursor:grab;
  box-shadow:0 3px 15px rgba(0,0,0,.35);
  transition:box-shadow .12s;white-space:nowrap;
}
.w-el:hover{box-shadow:0 5px 22px rgba(0,0,0,.45)}
.w-el.drag{z-index:50;box-shadow:0 10px 35px rgba(0,0,0,.5);cursor:grabbing}
.w-el .em{font-size:1.1rem}

/* New item sparkle */
.w-el.new-item{animation:popIn .35s cubic-bezier(.34,1.56,.64,1)}
@keyframes popIn{0%{transform:scale(0);opacity:0}100%{transform:scale(1);opacity:1}}
.sparkle-ring{
  position:absolute;inset:-12px;border-radius:20px;
  border:2px solid var(--accent);opacity:0;
  animation:sparkleRing .6s ease-out forwards;
  pointer-events:none;
}
@keyframes sparkleRing{
  0%{transform:scale(0.5);opacity:.7}
  100%{transform:scale(1.4);opacity:0}
}
/* First discovery sparkle is gold */
.sparkle-ring.gold{border-color:var(--gold)}
.first-disc-badge{
  position:absolute;top:-18px;left:50%;transform:translateX(-50%);
  font-size:.5rem;font-weight:700;color:var(--gold);letter-spacing:1px;
  text-transform:uppercase;white-space:nowrap;
  animation:badgePop .5s cubic-bezier(.34,1.56,.64,1) forwards,badgeFade 2s ease-out 1s forwards;
  pointer-events:none;text-shadow:0 0 8px rgba(251,191,36,.5);
}
@keyframes badgePop{0%{transform:translateX(-50%) scale(0) translateY(10px);opacity:0}100%{transform:translateX(-50%) scale(1) translateY(0);opacity:1}}
@keyframes badgeFade{to{opacity:0}}

/* WS buttons */
.ws-btns{position:absolute;bottom:10px;left:10px;z-index:10;display:flex;gap:5px}
.ws-b{padding:6px 12px;border-radius:7px;background:var(--panel);border:1px solid var(--border);color:var(--dim);font-family:'DM Sans',sans-serif;font-size:.64rem;font-weight:600;cursor:pointer;display:flex;align-items:center;gap:4px;transition:all .12s}
.ws-b:hover{color:var(--text);border-color:var(--border2)}

/* Loading */
.ld{position:absolute;z-index:30;display:none;pointer-events:none}
.ld.on{display:block}
.ld::after{content:'';display:block;width:18px;height:18px;border:2px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:sp .5s linear infinite}
@keyframes sp{to{transform:rotate(360deg)}}

/* MODAL */
.mo-bg{position:fixed;inset:0;z-index:80;background:rgba(0,0,0,.55);backdrop-filter:blur(5px);display:none;align-items:center;justify-content:center}
.mo-bg.open{display:flex}
.mo{background:var(--panel);border:1px solid var(--border);border-radius:14px;width:94%;max-width:520px;max-height:78vh;display:flex;flex-direction:column;overflow:hidden;box-shadow:0 16px 50px rgba(0,0,0,.5)}
.mo-head{padding:14px 18px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between}
.mo-head h2{font-size:.95rem;font-weight:700}
.mo-tabs{display:flex;gap:10px}
.mo-tab{font-size:.74rem;font-weight:600;color:var(--dim);cursor:pointer;padding-bottom:2px;border-bottom:2px solid transparent;transition:all .12s}
.mo-tab:hover{color:var(--text)}
.mo-tab.on{color:var(--text);border-color:var(--accent)}
.mo-x{background:none;border:none;color:var(--dim);font-size:1.1rem;cursor:pointer;padding:3px 7px;border-radius:5px}
.mo-x:hover{color:var(--text);background:rgba(255,255,255,.04)}
.mo-body{flex:1;overflow-y:auto;padding:14px 18px}
.mo-body::-webkit-scrollbar{width:3px}
.mo-body::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}

/* Save slots */
.sv-slot{padding:12px 14px;border:1px solid var(--border);border-radius:9px;margin-bottom:7px;cursor:pointer;transition:all .12s;display:flex;justify-content:space-between;align-items:center}
.sv-slot:hover{border-color:var(--border2)}
.sv-slot.cur{border-color:var(--accent);background:rgba(125,211,252,.03)}
.sv-info .sv-name{font-weight:600;font-size:.84rem}
.sv-info .sv-meta{font-size:.62rem;color:var(--dim);margin-top:2px}
.sv-acts{display:flex;gap:6px}
.sv-act{font-size:.6rem;color:var(--dim);cursor:pointer;font-weight:600;padding:4px 8px;border-radius:5px;border:1px solid var(--border);transition:all .12s}
.sv-act:hover{color:var(--text);border-color:var(--border2)}
.sv-act.del:hover{color:#f44;border-color:rgba(255,68,68,.3)}

/* Milestones */
.mile{padding:10px 12px;border:1px solid var(--border);border-radius:9px;margin-bottom:6px;display:flex;align-items:center;gap:10px}
.mile .mico{font-size:1.5rem;width:36px;text-align:center}
.mile .mtxt .mn{font-weight:600;font-size:.82rem}
.mile .mtxt .md{font-size:.62rem;color:var(--dim);margin-top:1px}
.mile.locked{opacity:.35}
.mile.locked .mn{color:var(--dim)}
.mile .check{margin-left:auto;color:var(--green);font-size:.9rem}

/* Disc log items */
.dl-item{display:flex;align-items:center;gap:8px;padding:6px 8px;border-radius:6px}
.dl-item:hover{background:rgba(255,255,255,.015)}
.dl-item .em{font-size:1rem;width:24px;text-align:center}
.dl-item .nm{font-weight:600;font-size:.78rem;flex:1}
.dl-item .rc{font-size:.62rem;color:var(--dim)}

@media(max-width:680px){
  .sidebar{width:220px;min-width:220px}
  .el-chip{font-size:.68rem;padding:5px 9px 5px 7px}
}
</style>
</head>
<body>

<div class="app">
  <div class="workspace" id="ws">
    <canvas id="starCvs"></canvas>
    <div class="ws-btns">
      <button class="ws-b" id="clearBtn">🗑️ Clear</button>
      <button class="ws-b" id="undoBtn">↩ Undo</button>
    </div>
    <div class="ld" id="loader"></div>
  </div>

  <div class="sidebar">
    <div class="sb-head">
      <div class="brand"><i>Element</i>&nbsp;Forge</div>
      <div class="pill-count" id="cnt">4</div>
    </div>
    <div class="sb-search">
      <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
      <input type="text" id="srcIn" placeholder="Search items...">
    </div>
    <div class="sort-row">
      <button class="sort-b on" data-s="time">Recent</button>
      <button class="sort-b" data-s="alpha">A-Z</button>
      <button class="sort-b" data-s="emoji">Emoji</button>
    </div>
    <div class="el-list" id="elList"></div>
    <div class="bb">
      <div style="display:flex;gap:4px">
        <button class="bb-btn" id="menuBtn"><span class="ic">☰</span>Menu</button>
        <button class="bb-btn" id="milesBtn"><span class="ic">🏆</span>Milestones</button>
      </div>
      <button class="bb-btn" id="logBtn"><span class="ic">📜</span>Log</button>
    </div>
  </div>
</div>

<!-- MODAL -->
<div class="mo-bg" id="moBg">
  <div class="mo">
    <div class="mo-head">
      <h2 id="moTitle">Menu</h2>
      <button class="mo-x" id="moX">✕</button>
    </div>
    <div class="mo-body" id="moBody"></div>
  </div>
</div>

<script>
// ═══════════════════════════════════════════════════════════
const MK='NWtxcavnNWhvo1nMuGETTw6f0B8WFxRS';
const STARTERS={Water:{e:'💧',t:0},Fire:{e:'🔥',t:1},Wind:{e:'💨',t:2},Earth:{e:'🌍',t:3}};

// MILESTONES (First Discovery system)
const MILESTONES=[
  {id:'life',need:10,icon:'🧬',name:'Create Life',desc:'Discover 10 elements to unlock the spark of life'},
  {id:'tech',need:25,icon:'⚡',name:'Harness Energy',desc:'25 elements — electricity flows through your veins'},
  {id:'civ',need:50,icon:'🏛️',name:'Build Civilization',desc:'50 elements — you\'ve built a world'},
  {id:'god',need:100,icon:'👁️',name:'Playing God',desc:'100 elements — nothing is beyond your reach'},
  {id:'madman',need:200,icon:'🤯',name:'Mad Scientist',desc:'200 elements — what have you created??'},
  {id:'inf',need:500,icon:'♾️',name:'Infinite',desc:'500 elements — you ARE the forge'},
];

let els={},recipes={},log=[],workItems=[],curSave=0,idC=0,sortMode='time',pending=false,prevMilestone=0;

function load(slot=0){
  try{
    const d=JSON.parse(localStorage.getItem('ef3_'+slot));
    if(d){els=d.els||{};recipes=d.rec||{};log=d.log||[];idC=d.idc||0}
    else reset();
  }catch(e){reset()}
  workItems=[];
  checkMilestones();
  renderSB();
}
function reset(){els={};for(const[k,v]of Object.entries(STARTERS))els[k]={e:v.e,t:v.t,first:false};recipes={};log=[];idC=0}
function save(slot=0){localStorage.setItem('ef3_'+slot,JSON.stringify({els,rec:recipes,log,idc:idC,at:Date.now()}))}

// ═══════════════════════════════════════════════════════════
//  STAR BG
// ═══════════════════════════════════════════════════════════
const SC=document.getElementById('starCvs'),SX=SC.getContext('2d');
let stars=[],clines=[];
function initStars(){
  const W=SC.width=SC.parentElement.clientWidth,H=SC.height=SC.parentElement.clientHeight;
  stars=[];clines=[];
  for(let i=0;i<80;i++)stars.push({x:Math.random()*W,y:Math.random()*H,r:Math.random()*1.2+0.3,b:Math.random()});
  for(let i=0;i<stars.length;i++)for(let j=i+1;j<stars.length;j++){
    const d=Math.hypot(stars[i].x-stars[j].x,stars[i].y-stars[j].y);
    if(d<140&&Math.random()<0.25)clines.push({a:i,b:j});
  }
}
function drawStars(){
  const W=SC.width,H=SC.height,t=performance.now()*.001;
  SX.clearRect(0,0,W,H);
  SX.strokeStyle='rgba(255,255,255,.03)';SX.lineWidth=.7;
  clines.forEach(l=>{SX.beginPath();SX.moveTo(stars[l.a].x,stars[l.a].y);SX.lineTo(stars[l.b].x,stars[l.b].y);SX.stroke()});
  stars.forEach(s=>{SX.beginPath();SX.arc(s.x,s.y,s.r,0,Math.PI*2);SX.fillStyle=`rgba(210,215,230,${.15+Math.sin(t*.7+s.b*10)*.12})`;SX.fill()});
  requestAnimationFrame(drawStars);
}
addEventListener('resize',initStars);initStars();drawStars();

// ═══════════════════════════════════════════════════════════
//  SIDEBAR
// ═══════════════════════════════════════════════════════════
const elList=document.getElementById('elList'),srcIn=document.getElementById('srcIn');
function renderSB(){
  const q=srcIn.value.toLowerCase();
  elList.innerHTML='';
  let sorted=Object.entries(els);
  if(sortMode==='alpha')sorted.sort((a,b)=>a[0].localeCompare(b[0]));
  else if(sortMode==='emoji')sorted.sort((a,b)=>(a[1].e||'').localeCompare(b[1].e||''));
  else sorted.sort((a,b)=>(a[1].t||0)-(b[1].t||0));
  sorted.forEach(([n,d])=>{
    if(q&&!n.toLowerCase().includes(q))return;
    const c=document.createElement('div');
    c.className='el-chip'+(d.first?' is-first':'');
    c.innerHTML=`<span class="em">${d.e||'❓'}</span>${n}`;
    c.addEventListener('mousedown',e=>startDrag(e,n));
    c.addEventListener('touchstart',e=>{e.preventDefault();startDrag(e,n)},{passive:false});
    elList.appendChild(c);
  });
  document.getElementById('cnt').textContent=Object.keys(els).length;
}
srcIn.addEventListener('input',renderSB);
document.querySelectorAll('.sort-b').forEach(b=>b.addEventListener('click',()=>{
  document.querySelectorAll('.sort-b').forEach(x=>x.classList.remove('on'));
  b.classList.add('on');sortMode=b.dataset.s;renderSB();
}));

// ═══════════════════════════════════════════════════════════
//  DRAG SYSTEM
// ═══════════════════════════════════════════════════════════
const ws=document.getElementById('ws');
let floatEl=null,dragD=null;

function startDrag(e,name){
  const t=e.touches?e.touches[0]:e;
  dragD={name,src:'sb'};
  const d=els[name];
  floatEl=document.createElement('div');
  floatEl.className='w-el drag';
  floatEl.style.cssText='position:fixed;z-index:1000;pointer-events:none;transition:none';
  floatEl.innerHTML=`<span class="em">${d.e||'❓'}</span>${name}`;
  document.body.appendChild(floatEl);
  const r=floatEl.getBoundingClientRect();
  floatEl.style.left=(t.clientX-r.width/2)+'px';
  floatEl.style.top=(t.clientY-r.height/2)+'px';
}
document.addEventListener('mousemove',mv);document.addEventListener('touchmove',mv,{passive:false});
function mv(e){if(!floatEl)return;e.preventDefault?.();const t=e.touches?e.touches[0]:e;const r=floatEl.getBoundingClientRect();floatEl.style.left=(t.clientX-r.width/2)+'px';floatEl.style.top=(t.clientY-r.height/2)+'px'}
document.addEventListener('mouseup',drop);document.addEventListener('touchend',drop);
function drop(e){
  if(!floatEl||!dragD)return;
  const t=e.changedTouches?e.changedTouches[0]:e;
  floatEl.remove();floatEl=null;
  const wr=ws.getBoundingClientRect();
  const x=t.clientX-wr.left,y=t.clientY-wr.top;
  if(x>=0&&y>=0&&x<=wr.width&&y<=wr.height){
    const it={id:++idC,name:dragD.name,x,y};
    workItems.push(it);renderWI(it);tryCombo(it);
  }
  dragD=null;
}

// ═══════════════════════════════════════════════════════════
//  WORKSPACE ITEMS
// ═══════════════════════════════════════════════════════════
function renderWI(item,isNew=false,isFirst=false){
  const d=els[item.name];if(!d)return;
  const div=document.createElement('div');
  div.className='w-el'+(isNew?' new-item':'');
  div.id='wi-'+item.id;
  div.style.left=(item.x-45)+'px';div.style.top=(item.y-16)+'px';
  div.innerHTML=`<span class="em">${d.e||'❓'}</span>${item.name}`;

  // Sparkle ring for new items
  if(isNew){
    const ring=document.createElement('div');
    ring.className='sparkle-ring'+(isFirst?' gold':'');
    div.appendChild(ring);
    setTimeout(()=>ring.remove(),700);
    // Mini particles behind the element
    setTimeout(()=>spawnMiniParticles(item.x,item.y,isFirst),50);
  }
  if(isFirst){
    const badge=document.createElement('div');
    badge.className='first-disc-badge';
    badge.textContent='✦ FIRST DISCOVERY ✦';
    div.appendChild(badge);
    setTimeout(()=>badge.remove(),3500);
  }

  let dragging=false,sx,sy,ox,oy;
  function sd(e){e.preventDefault();e.stopPropagation();dragging=true;div.classList.add('drag');const t=e.touches?e.touches[0]:e;const r=div.getBoundingClientRect();const wr=ws.getBoundingClientRect();sx=t.clientX;sy=t.clientY;ox=r.left-wr.left;oy=r.top-wr.top}
  function md(e){if(!dragging)return;const t=e.touches?e.touches[0]:e;div.style.left=(ox+t.clientX-sx)+'px';div.style.top=(oy+t.clientY-sy)+'px';item.x=ox+t.clientX-sx+45;item.y=oy+t.clientY-sy+16}
  function ed(){if(!dragging)return;dragging=false;div.classList.remove('drag');tryCombo(item)}
  div.addEventListener('mousedown',sd);div.addEventListener('touchstart',sd,{passive:false});
  document.addEventListener('mousemove',md);document.addEventListener('touchmove',md,{passive:false});
  document.addEventListener('mouseup',ed);document.addEventListener('touchend',ed);
  div.addEventListener('dblclick',()=>{workItems=workItems.filter(i=>i.id!==item.id);div.remove()});
  ws.appendChild(div);
}

function spawnMiniParticles(cx,cy,gold){
  const wr=ws.getBoundingClientRect();
  const cols=gold?['#fbbf24','#f59e0b','#fcd34d','#fff']:['#7dd3fc','#a78bfa','#4ade80','#fff'];
  for(let i=0;i<(gold?14:8);i++){
    const p=document.createElement('div');
    const a=Math.random()*Math.PI*2,d=25+Math.random()*40;
    p.style.cssText=`position:absolute;width:4px;height:4px;border-radius:50%;pointer-events:none;z-index:6;left:${cx}px;top:${cy}px;background:${cols[i%cols.length]}`;
    ws.appendChild(p);
    p.animate([
      {transform:'translate(-2px,-2px) scale(1)',opacity:.8},
      {transform:`translate(${Math.cos(a)*d-2}px,${Math.sin(a)*d-2}px) scale(0)`,opacity:0}
    ],{duration:500+Math.random()*300,easing:'ease-out'});
    setTimeout(()=>p.remove(),900);
  }
}

// ═══════════════════════════════════════════════════════════
//  COMBINE
// ═══════════════════════════════════════════════════════════
const CDIST=85;
async function tryCombo(item){
  for(const o of workItems){
    if(o.id===item.id)continue;
    if(Math.hypot(item.x-o.x,item.y-o.y)<CDIST){await combine(item,o);return}
  }
}
async function combine(a,b){
  if(pending)return;pending=true;
  const dA=document.getElementById('wi-'+a.id),dB=document.getElementById('wi-'+b.id);
  const mx=(a.x+b.x)/2,my=(a.y+b.y)/2;
  if(dA){dA.style.transition='all .2s';dA.style.left=(mx-45)+'px';dA.style.top=(my-16)+'px';dA.style.opacity='.4'}
  if(dB){dB.style.transition='all .2s';dB.style.left=(mx-45)+'px';dB.style.top=(my-16)+'px';dB.style.opacity='.4'}
  
  const ld=document.getElementById('loader');
  ld.style.left=(mx-9)+'px';ld.style.top=(my-28)+'px';ld.style.position='absolute';ld.classList.add('on');

  const k1=a.name+'+'+b.name,k2=b.name+'+'+a.name;
  let rn=recipes[k1]||recipes[k2],re=null,isNew=false,isFirst=false;

  if(!rn){
    try{const r=await callAI(a.name,b.name);rn=r.name;re=r.emoji}
    catch(err){console.error(err);rn=a.name+' '+b.name;re='❓'}
    recipes[k1]=rn;
    if(!els[rn]){
      isNew=true;
      const count=Object.keys(els).length;
      // Check if this is a First Discovery (milestone unlock)
      const milestone=MILESTONES.find(m=>count+1===m.need);
      if(milestone)isFirst=true;
      els[rn]={e:re||'❓',t:count,first:isFirst};
      log.push({n:rn,e:re||'❓',f1:a.name,f2:b.name,at:Date.now(),first:isFirst});
    }
  }
  if(!re&&els[rn])re=els[rn].e;

  ld.classList.remove('on');
  if(dA)dA.remove();if(dB)dB.remove();
  workItems=workItems.filter(i=>i.id!==a.id&&i.id!==b.id);

  const ni={id:++idC,name:rn,x:mx,y:my};
  workItems.push(ni);
  renderWI(ni,isNew,isFirst);
  if(isNew){renderSB();checkMilestones()}
  save(curSave);
  pending=false;
}

// ═══════════════════════════════════════════════════════════
//  MISTRAL AI
// ═══════════════════════════════════════════════════════════
async function callAI(e1,e2){
  const r=await fetch('https://api.mistral.ai/v1/chat/completions',{
    method:'POST',
    headers:{'Content-Type':'application/json','Authorization':'Bearer '+MK},
    body:JSON.stringify({
      model:'mistral-small-latest',
      messages:[{role:'user',content:`Element combination game. Combine "${e1}" + "${e2}". Reply ONLY with JSON: {"name":"result","emoji":"🔥"}
Rules:
- Result must logically/creatively follow from inputs
- 1-3 words max
- Be creative, funny, surprising
- Allow ANYTHING: life, death, drugs, memes, chaos, philosophy, absurdity
- Same element + same = bigger/more intense version
- Think laterally: Water+Fire=Steam, Life+Plant=Weed, Smoke+Roll=Joint, Earth+Life=Human
- Single relevant emoji
- ONLY output JSON, nothing else`}],
      max_tokens:60,temperature:0.8,
    })
  });
  if(!r.ok)throw new Error(r.status);
  const d=await r.json();
  const txt=d.choices[0].message.content.trim();
  try{
    const m=txt.match(/\{[\s\S]*?\}/);
    if(m){const p=JSON.parse(m[0]);return{name:(p.name||'Thing').substring(0,30),emoji:p.emoji||'❓'}}
  }catch(e){}
  return{name:e1+' '+e2,emoji:'❓'};
}

// ═══════════════════════════════════════════════════════════
//  MILESTONES
// ═══════════════════════════════════════════════════════════
function checkMilestones(){
  const count=Object.keys(els).length;
  prevMilestone=MILESTONES.filter(m=>count>=m.need).length;
}

// ═══════════════════════════════════════════════════════════
//  WORKSPACE BTNS
// ═══════════════════════════════════════════════════════════
document.getElementById('clearBtn').addEventListener('click',()=>{ws.querySelectorAll('.w-el').forEach(e=>e.remove());workItems=[]});
document.getElementById('undoBtn').addEventListener('click',()=>{if(!workItems.length)return;const l=workItems.pop();const d=document.getElementById('wi-'+l.id);if(d)d.remove()});

// ═══════════════════════════════════════════════════════════
//  MODAL
// ═══════════════════════════════════════════════════════════
const moBg=document.getElementById('moBg'),moBody=document.getElementById('moBody'),moTitle=document.getElementById('moTitle');
document.getElementById('moX').addEventListener('click',()=>moBg.classList.remove('open'));
moBg.addEventListener('click',e=>{if(e.target===moBg)moBg.classList.remove('open')});

document.getElementById('menuBtn').addEventListener('click',()=>{moTitle.textContent='Saves';renderSaves();moBg.classList.add('open')});
document.getElementById('milesBtn').addEventListener('click',()=>{moTitle.textContent='Milestones';renderMiles();moBg.classList.add('open')});
document.getElementById('logBtn').addEventListener('click',()=>{moTitle.textContent='Discovery Log';renderLog();moBg.classList.add('open')});

function renderSaves(){
  let h='';
  for(let i=0;i<3;i++){
    let meta='Empty slot';
    const raw=localStorage.getItem('ef3_'+i);
    if(raw){try{const d=JSON.parse(raw);meta=Object.keys(d.els||{}).length+' items · '+new Date(d.at||0).toLocaleDateString()}catch(e){}}
    h+=`<div class="sv-slot${i===curSave?' cur':''}">
      <div class="sv-info"><div class="sv-name">${i===curSave?'▸ ':''} Save ${i+1}</div><div class="sv-meta">${meta}</div></div>
      <div class="sv-acts">
        <div class="sv-act" onclick="doLoad(${i})">Load</div>
        <div class="sv-act" onclick="doSave(${i})">Save</div>
        <div class="sv-act del" onclick="doReset(${i})">Reset</div>
      </div>
    </div>`;
  }
  moBody.innerHTML=h;
}
window.doLoad=i=>{curSave=i;load(i);ws.querySelectorAll('.w-el').forEach(e=>e.remove());renderSaves()};
window.doSave=i=>{curSave=i;save(i);renderSaves()};
window.doReset=i=>{
  if(!confirm('Reset Save '+(i+1)+'?'))return;
  localStorage.removeItem('ef3_'+i);
  if(i===curSave){reset();ws.querySelectorAll('.w-el').forEach(e=>e.remove());renderSB()}
  renderSaves();
};

function renderMiles(){
  const count=Object.keys(els).length;
  let h='<div style="font-size:.72rem;color:var(--dim);margin-bottom:12px">Unlock milestones by discovering more elements. You have <strong style="color:var(--text)">'+count+'</strong> elements.</div>';
  MILESTONES.forEach(m=>{
    const done=count>=m.need;
    h+=`<div class="mile${done?'':' locked'}">
      <div class="mico">${m.icon}</div>
      <div class="mtxt"><div class="mn">${m.name}</div><div class="md">${m.desc} (${m.need} items)</div></div>
      ${done?'<div class="check">✓</div>':'<div style="margin-left:auto;font-size:.65rem;color:var(--dim)">'+(m.need-count)+' to go</div>'}
    </div>`;
  });
  moBody.innerHTML=h;
}

function renderLog(){
  if(!log.length){moBody.innerHTML='<div style="text-align:center;padding:30px;color:var(--dim)">No discoveries yet. Start combining!</div>';return}
  let h='';
  [...log].reverse().forEach(d=>{
    h+=`<div class="dl-item">
      <span class="em">${d.e}</span>
      <span class="nm">${d.n}${d.first?' <span style="color:var(--gold);font-size:.5rem">✦ FIRST</span>':''}</span>
      <span class="rc">${d.f1} + ${d.f2}</span>
    </div>`;
  });
  moBody.innerHTML=h;
}

// INIT
load(0);renderSB();
</script>
