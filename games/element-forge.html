<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Element Forge</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0c0c14;
  --panel:#111119;
  --panel2:#16161f;
  --border:#1f1f2e;
  --accent:#f59e0b;
  --accent2:#ef4444;
  --accent3:#8b5cf6;
  --text:#e8e6f0;
  --text-dim:#5e5d6e;
  --glow:rgba(245,158,11,.4);
}
html,body{height:100%;overflow:hidden;background:var(--bg);font-family:'DM Sans',sans-serif;color:var(--text);user-select:none}
.app{display:flex;height:100vh}

/* SIDEBAR */
.sidebar{
  width:280px;min-width:280px;
  background:var(--panel);
  border-right:1px solid var(--border);
  display:flex;flex-direction:column;
  z-index:10;
}
.sidebar-header{
  padding:16px 18px;
  border-bottom:1px solid var(--border);
  display:flex;align-items:center;justify-content:space-between;
}
.sidebar-header h1{
  font-size:1rem;font-weight:700;
  background:linear-gradient(135deg,var(--accent),var(--accent2));
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;
}
.counter{
  font-family:'JetBrains Mono',monospace;
  font-size:.72rem;color:var(--accent);
  background:rgba(245,158,11,.1);
  padding:4px 10px;border-radius:20px;
  border:1px solid rgba(245,158,11,.2);
}
.sidebar-search{padding:10px 14px;border-bottom:1px solid var(--border)}
.sidebar-search input{
  width:100%;padding:8px 12px;
  border:1px solid var(--border);border-radius:8px;
  background:var(--bg);color:var(--text);
  font-family:'DM Sans',sans-serif;font-size:.82rem;
  outline:none;
}
.sidebar-search input:focus{border-color:var(--accent)}
.sidebar-search input::placeholder{color:var(--text-dim)}
.elem-list{
  flex:1;overflow-y:auto;
  padding:8px;
  display:flex;flex-wrap:wrap;align-content:flex-start;gap:6px;
}
.elem-list::-webkit-scrollbar{width:4px}
.elem-list::-webkit-scrollbar-thumb{background:#2a2a3a;border-radius:4px}

/* Element chips */
.elem-chip{
  display:inline-flex;align-items:center;gap:5px;
  padding:6px 12px;border-radius:8px;
  background:var(--panel2);
  border:1px solid var(--border);
  font-size:.78rem;font-weight:500;
  cursor:grab;
  transition:transform .15s,box-shadow .15s,border-color .15s;
  white-space:nowrap;
}
.elem-chip:hover{
  transform:translateY(-1px);
  box-shadow:0 4px 16px rgba(0,0,0,.3);
  border-color:#333;
}
.elem-chip:active{cursor:grabbing}
.elem-chip .emoji{font-size:1rem}
.elem-chip.new-glow{
  animation:chipGlow .8s ease;
}
@keyframes chipGlow{
  0%{box-shadow:0 0 0 0 var(--glow)}
  50%{box-shadow:0 0 20px 6px var(--glow)}
  100%{box-shadow:0 0 0 0 transparent}
}

/* WORKSPACE */
.workspace{
  flex:1;position:relative;overflow:hidden;
  background:var(--bg);
  background-image:
    radial-gradient(circle at 1px 1px, #1a1a28 1px, transparent 0);
  background-size:40px 40px;
}

/* Dragged element on workspace */
.work-elem{
  position:absolute;
  display:flex;align-items:center;gap:6px;
  padding:10px 18px;border-radius:12px;
  background:var(--panel2);
  border:1px solid var(--border);
  font-size:.88rem;font-weight:600;
  cursor:grab;
  box-shadow:0 4px 20px rgba(0,0,0,.4);
  z-index:5;
  transition:box-shadow .2s;
  white-space:nowrap;
}
.work-elem:hover{box-shadow:0 6px 30px rgba(0,0,0,.5)}
.work-elem .emoji{font-size:1.3rem}
.work-elem .close{
  margin-left:6px;
  font-size:.7rem;
  color:var(--text-dim);
  cursor:pointer;
  padding:2px 4px;
  border-radius:4px;
}
.work-elem .close:hover{color:var(--accent2);background:rgba(239,68,68,.1)}

/* Discovery flash */
.discovery-overlay{
  position:fixed;inset:0;
  display:flex;align-items:center;justify-content:center;
  z-index:100;
  background:rgba(0,0,0,0);
  pointer-events:none;
  transition:background .3s;
}
.discovery-overlay.show{background:rgba(0,0,0,.6);pointer-events:auto}
.discovery-card{
  text-align:center;
  transform:scale(0.5);opacity:0;
  transition:all .4s cubic-bezier(.175,.885,.32,1.275);
}
.discovery-overlay.show .discovery-card{transform:scale(1);opacity:1}
.discovery-emoji{font-size:4rem;margin-bottom:12px}
.discovery-name{
  font-size:1.8rem;font-weight:700;
  background:linear-gradient(135deg,var(--accent),var(--accent2));
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;
  margin-bottom:6px;
}
.discovery-sub{color:var(--text-dim);font-size:.85rem}
.discovery-recipe{color:var(--text-dim);font-size:.75rem;margin-top:4px}

/* Particles */
.particle{
  position:fixed;
  width:6px;height:6px;
  border-radius:50%;
  pointer-events:none;
  z-index:101;
}

/* Hint bar */
.hint-bar{
  position:absolute;
  bottom:16px;left:50%;transform:translateX(-50%);
  background:var(--panel);
  border:1px solid var(--border);
  border-radius:12px;
  padding:10px 20px;
  font-size:.8rem;
  color:var(--text-dim);
  display:flex;align-items:center;gap:8px;
  z-index:6;
  white-space:nowrap;
}
.hint-bar .kb{
  background:var(--bg);
  padding:2px 8px;
  border-radius:4px;
  border:1px solid var(--border);
  font-size:.7rem;
  font-family:'JetBrains Mono',monospace;
  color:var(--text);
}

/* Clear workspace btn */
.clear-ws{
  position:absolute;top:14px;right:14px;
  background:var(--panel);border:1px solid var(--border);
  border-radius:8px;padding:8px 14px;
  color:var(--text-dim);font-size:.75rem;font-weight:600;
  cursor:pointer;z-index:6;
  font-family:'DM Sans',sans-serif;
  transition:all .15s;
}
.clear-ws:hover{border-color:var(--accent2);color:var(--accent2)}

/* Mobile */
.menu-toggle{
  display:none;position:fixed;top:10px;left:10px;z-index:20;
  width:38px;height:38px;border-radius:8px;
  background:var(--panel);border:1px solid var(--border);
  color:var(--text);font-size:1.1rem;cursor:pointer;
  align-items:center;justify-content:center;
}
@media(max-width:700px){
  .sidebar{position:fixed;left:-290px;top:0;bottom:0;transition:left .3s;z-index:15}
  .sidebar.open{left:0}
  .menu-toggle{display:flex}
}
</style>
</head>
<body>

<button class="menu-toggle" id="menuToggle">☰</button>

<div class="app">
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-header">
      <h1>⚗️ Element Forge</h1>
      <div class="counter"><span id="countDisc">4</span> / <span id="countTotal">0</span></div>
    </div>
    <div class="sidebar-search">
      <input type="text" id="searchEl" placeholder="Search elements…">
    </div>
    <div class="elem-list" id="elemList"></div>
  </aside>
  <div class="workspace" id="workspace">
    <button class="clear-ws" id="clearWs">✕ Clear Workspace</button>
    <div class="hint-bar">
      Drag elements from sidebar → Drop two near each other to combine
    </div>
  </div>
</div>

<!-- Discovery overlay -->
<div class="discovery-overlay" id="discOverlay">

    <div class="discovery-sub" id="discSub"></div>

  "Ore":{emoji:"⛏️",tier:2,cat:"material"},
  "Gear":{emoji:"⚙️",tier:3,cat:"tool"},
  "Machine":{emoji:"🏗️",tier:4,cat:"tech"},
  "Rail":{emoji:"🛤️",tier:4,cat:"build"},
  "Space":{emoji:"🌌",tier:5,cat:"space"},
  "Bean":{emoji:"☕",tier:3,cat:"food"},
  "Rice":{emoji:"🍚",tier:3,cat:"food"},
  "Milk":{emoji:"🥛",tier:3,cat:"food"},
  "Circle":{emoji:"⭕",tier:2,cat:"concept"},
  "Alps":{emoji:"🏔️",tier:5,cat:"nature"},
  "Dune":{emoji:"🏜️",tier:4,cat:"nature"},
  "Sandworm":{emoji:"🐛",tier:5,cat:"myth"},
  "Brain":{emoji:"🧠",tier:4,cat:"life"},
  "Thought":{emoji:"💭",tier:4,cat:"concept"},
  "Intelligence":{emoji:"🧠",tier:4,cat:"concept"},
  "Dance":{emoji:"💃",tier:4,cat:"art"},
  "Sport":{emoji:"⚽",tier:4,cat:"concept"},
  "Sleep":{emoji:"😴",tier:3,cat:"concept"},
  "Question":{emoji:"❓",tier:4,cat:"concept"},
});

// ═══════════════════════════════════════════════════════════════
//  GAME STATE
// ═══════════════════════════════════════════════════════════════
const totalElements = Object.keys(ELEMENTS).length;
let discovered = new Set(["Fire","Water","Earth","Air"]);
let workspaceItems = []; // {id, name, x, y}
let dragItem = null;
let dragSource = null; // 'sidebar' or 'workspace'
let dragOffX = 0, dragOffY = 0;
let idCounter = 0;

// Load saved progress
try {
  const saved = localStorage.getItem('elementforge_discovered');
  if(saved) discovered = new Set(JSON.parse(saved));
} catch(e){}

function saveProgress(){
  localStorage.setItem('elementforge_discovered', JSON.stringify([...discovered]));
}

// ═══════════════════════════════════════════════════════════════
//  RENDER SIDEBAR
// ═══════════════════════════════════════════════════════════════
const elemList = document.getElementById('elemList');
const countDisc = document.getElementById('countDisc');
const countTotal = document.getElementById('countTotal');
const searchEl = document.getElementById('searchEl');

countTotal.textContent = totalElements;

function renderSidebar(){
  const q = searchEl.value.toLowerCase();
  elemList.innerHTML = '';
  const sorted = [...discovered].sort((a,b) => {
    const ta = ELEMENTS[a]?.tier||0, tb = ELEMENTS[b]?.tier||0;
    if(ta !== tb) return ta - tb;
    return a.localeCompare(b);
  });
  sorted.forEach(name => {
    if(q && !name.toLowerCase().includes(q)) return;
    const el = ELEMENTS[name];
    if(!el) return;
    const chip = document.createElement('div');
    chip.className = 'elem-chip';
    chip.innerHTML = `<span class="emoji">${el.emoji}</span>${name}`;
    chip.draggable = false;
    // Mouse drag from sidebar
    chip.addEventListener('mousedown', e => startSidebarDrag(e, name));
    chip.addEventListener('touchstart', e => { e.preventDefault(); startSidebarDrag(e, name); }, {passive:false});
    elemList.appendChild(chip);
  });
  countDisc.textContent = discovered.size;
}

searchEl.addEventListener('input', renderSidebar);
renderSidebar();

// ═══════════════════════════════════════════════════════════════
//  DRAG & DROP SYSTEM
// ═══════════════════════════════════════════════════════════════
const workspace = document.getElementById('workspace');
let floatingEl = null;

function startSidebarDrag(e, name){
  const t = e.touches ? e.touches[0] : e;
  dragSource = 'sidebar';
  dragItem = {name, id: null};
  createFloating(name, t.clientX, t.clientY);
}

function createFloating(name, x, y){
  const el = ELEMENTS[name];
  if(floatingEl) floatingEl.remove();
  floatingEl = document.createElement('div');
  floatingEl.className = 'work-elem';
  floatingEl.style.position = 'fixed';
  floatingEl.style.zIndex = 1000;
  floatingEl.style.pointerEvents = 'none';
  floatingEl.style.transition = 'none';
  floatingEl.innerHTML = `<span class="emoji">${el.emoji}</span>${name}`;
  document.body.appendChild(floatingEl);
  const rect = floatingEl.getBoundingClientRect();
  dragOffX = rect.width / 2;
  dragOffY = rect.height / 2;
  floatingEl.style.left = (x - dragOffX) + 'px';
  floatingEl.style.top = (y - dragOffY) + 'px';
}

document.addEventListener('mousemove', onDragMove);
document.addEventListener('touchmove', onDragMove, {passive:false});
function onDragMove(e){
  if(!floatingEl) return;
  e.preventDefault && e.preventDefault();
  const t = e.touches ? e.touches[0] : e;
  floatingEl.style.left = (t.clientX - dragOffX) + 'px';
  floatingEl.style.top = (t.clientY - dragOffY) + 'px';
}

document.addEventListener('mouseup', onDragEnd);
document.addEventListener('touchend', onDragEnd);
function onDragEnd(e){
  if(!floatingEl || !dragItem) return;
  const t = e.changedTouches ? e.changedTouches[0] : e;
  floatingEl.remove();
  floatingEl = null;

  // Check if dropped on workspace
  const wsRect = workspace.getBoundingClientRect();
  const x = t.clientX - wsRect.left;
  const y = t.clientY - wsRect.top;

  if(x >= 0 && y >= 0 && x <= wsRect.width && y <= wsRect.height){
    if(dragSource === 'sidebar'){
      // Place new element
      const item = {id: ++idCounter, name: dragItem.name, x, y};
      workspaceItems.push(item);
      renderWorkspaceItem(item);
      tryCombiNearby(item);
    }
  }

  dragItem = null;
  dragSource = null;
}

// ═══════════════════════════════════════════════════════════════
//  WORKSPACE ELEMENTS
// ═══════════════════════════════════════════════════════════════

function renderWorkspaceItem(item){
  const el = ELEMENTS[item.name];
  if(!el) return;
  const div = document.createElement('div');
  div.className = 'work-elem';
  div.id = 'ws-' + item.id;
  div.style.left = (item.x - 50) + 'px';
  div.style.top = (item.y - 20) + 'px';
  div.innerHTML = `<span class="emoji">${el.emoji}</span>${item.name}<span class="close" data-id="${item.id}">✕</span>`;

  // Drag workspace items
  let wsDragging = false;
  let startX, startY, origX, origY;

  div.addEventListener('mousedown', e => {
    if(e.target.classList.contains('close')) return;
    wsDragging = true;
    const rect = div.getBoundingClientRect();
    const wsRect = workspace.getBoundingClientRect();
    startX = e.clientX; startY = e.clientY;
    origX = rect.left - wsRect.left; origY = rect.top - wsRect.top;
    div.style.zIndex = 50;
    e.preventDefault();
  });

  const moveHandler = e => {
    if(!wsDragging) return;
    const dx = e.clientX - startX;
    const dy = e.clientY - startY;
    div.style.left = (origX + dx) + 'px';
    div.style.top = (origY + dy) + 'px';
    item.x = origX + dx + 50;
    item.y = origY + dy + 20;
  };
  const upHandler = () => {
    if(!wsDragging) return;
    wsDragging = false;
    div.style.zIndex = 5;
    tryCombiNearby(item);
  };
  document.addEventListener('mousemove', moveHandler);
  document.addEventListener('mouseup', upHandler);

  // Close button
  div.querySelector('.close').addEventListener('click', () => {
    workspaceItems = workspaceItems.filter(i => i.id !== item.id);
    div.remove();
  });

  workspace.appendChild(div);
}

// ═══════════════════════════════════════════════════════════════
//  COMBINATION LOGIC
// ═══════════════════════════════════════════════════════════════

function tryCombiNearby(item){
  const DIST = 100;
  for(const other of workspaceItems){
    if(other.id === item.id) continue;
    const dx = item.x - other.x;
    const dy = item.y - other.y;
    if(Math.sqrt(dx*dx+dy*dy) < DIST){
      combine(item, other);
      return;
    }
  }
}

function combine(a, b){
  const key1 = a.name + '+' + b.name;
  const key2 = b.name + '+' + a.name;
  const result = RECIPES[key1] || RECIPES[key2];

  if(!result || !ELEMENTS[result]) return;

  // Remove both from workspace
  const divA = document.getElementById('ws-' + a.id);
  const divB = document.getElementById('ws-' + b.id);

  // Animate them together
  const midX = (a.x + b.x) / 2;
  const midY = (a.y + b.y) / 2;

  if(divA) { divA.style.transition = 'all .3s'; divA.style.left = (midX-50)+'px'; divA.style.top = (midY-20)+'px'; divA.style.opacity = '0'; divA.style.transform = 'scale(0.5)'; }
  if(divB) { divB.style.transition = 'all .3s'; divB.style.left = (midX-50)+'px'; divB.style.top = (midY-20)+'px'; divB.style.opacity = '0'; divB.style.transform = 'scale(0.5)'; }

  setTimeout(() => {
    if(divA) divA.remove();
    if(divB) divB.remove();
    workspaceItems = workspaceItems.filter(i => i.id !== a.id && i.id !== b.id);

    // Create result
    const newItem = {id: ++idCounter, name: result, x: midX, y: midY};
    workspaceItems.push(newItem);
    renderWorkspaceItem(newItem);

    const isNew = !discovered.has(result);
    discovered.add(result);
    saveProgress();
    renderSidebar();

    if(isNew){
      showDiscovery(result, a.name, b.name);
      spawnParticles(midX, midY);
    }
  }, 300);
}

// ═══════════════════════════════════════════════════════════════
//  DISCOVERY ANIMATION
// ═══════════════════════════════════════════════════════════════
const discOverlay = document.getElementById('discOverlay');

function showDiscovery(name, from1, from2){
  const el = ELEMENTS[name];
  document.getElementById('discEmoji').textContent = el.emoji;
  document.getElementById('discName').textContent = name;
  document.getElementById('discSub').textContent = `New element discovered!`;
  document.getElementById('discRecipe').textContent = `${from1} + ${from2} = ${name}`;
  discOverlay.classList.add('show');

  setTimeout(() => {
    discOverlay.classList.remove('show');
  }, 1800);

  discOverlay.addEventListener('click', () => {
    discOverlay.classList.remove('show');
  }, {once:true});
}

function spawnParticles(cx, cy){
  const wsRect = workspace.getBoundingClientRect();
  const colors = ['#f59e0b','#ef4444','#8b5cf6','#10b981','#3b82f6','#f472b6'];
  for(let i = 0; i < 20; i++){
    const p = document.createElement('div');
    p.className = 'particle';
    p.style.left = (wsRect.left + cx) + 'px';
    p.style.top = (wsRect.top + cy) + 'px';
    p.style.background = colors[Math.floor(Math.random()*colors.length)];
    document.body.appendChild(p);
    const angle = Math.random() * Math.PI * 2;
    const dist = 60 + Math.random() * 100;
    const tx = Math.cos(angle) * dist;
    const ty = Math.sin(angle) * dist;
    p.animate([
      {transform:'translate(0,0) scale(1)', opacity:1},
      {transform:`translate(${tx}px,${ty}px) scale(0)`, opacity:0}
    ], {duration: 600 + Math.random()*400, easing:'cubic-bezier(.25,.46,.45,.94)'});
    setTimeout(() => p.remove(), 1100);
  }
}

// ═══════════════════════════════════════════════════════════════
//  CLEAR WORKSPACE
// ═══════════════════════════════════════════════════════════════
document.getElementById('clearWs').addEventListener('click', () => {
  workspace.querySelectorAll('.work-elem').forEach(el => el.remove());
  workspaceItems = [];
});

// Mobile menu
document.getElementById('menuToggle').addEventListener('click', () => {
  document.getElementById('sidebar').classList.toggle('open');
});
</script>
