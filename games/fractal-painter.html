<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fractal Painter</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0a0a12;
  --panel:#12121e;
  --panel-border:#1e1e30;
  --accent:#7c5cff;
  --accent2:#ff5ca0;
  --text:#e0dfe8;
  --text-dim:#6b6a7a;
  --radius:10px;
}
html,body{
  height:100%;
  overflow:hidden;
  background:var(--bg);
  font-family:'DM Sans',sans-serif;
  color:var(--text);
  user-select:none;
}
.app{display:flex;height:100vh;width:100vw}

/* ── SIDEBAR ── */
.sidebar{
  width:260px;
  min-width:260px;
  background:var(--panel);
  border-right:1px solid var(--panel-border);
  display:flex;
  flex-direction:column;
  overflow-y:auto;
  z-index:10;
}
.sidebar::-webkit-scrollbar{width:4px}
.sidebar::-webkit-scrollbar-thumb{background:#2a2a40;border-radius:4px}
.sidebar-header{
  padding:18px 18px 10px;
  border-bottom:1px solid var(--panel-border);
}
.sidebar-header h1{
  font-size:1.1rem;
  font-weight:700;
  background:linear-gradient(135deg,var(--accent),var(--accent2));
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
}
.sidebar-header p{font-size:.7rem;color:var(--text-dim);margin-top:2px}
.section{padding:14px 18px;border-bottom:1px solid var(--panel-border)}
.section-title{
  font-size:.65rem;
  font-weight:700;
  text-transform:uppercase;
  letter-spacing:1.5px;
  color:var(--text-dim);
  margin-bottom:10px;
}

/* Symmetry buttons */
.sym-grid{display:grid;grid-template-columns:1fr 1fr;gap:5px}
.sym-btn{
  padding:6px 4px;
  border:1px solid var(--panel-border);
  border-radius:6px;
  background:transparent;
  color:var(--text-dim);
  font-family:'DM Sans',sans-serif;
  font-size:.7rem;
  font-weight:500;
  cursor:pointer;
  transition:all .15s;
  white-space:nowrap;
}
.sym-btn:hover{border-color:var(--accent);color:var(--text)}
.sym-btn.active{
  background:var(--accent);
  border-color:var(--accent);
  color:#fff;
}

/* Color swatches */
.swatches{display:flex;flex-wrap:wrap;gap:6px}
.swatch{
  width:28px;height:28px;
  border-radius:50%;
  border:2px solid transparent;
  cursor:pointer;
  transition:transform .15s, border-color .15s;
}
.swatch:hover{transform:scale(1.15)}
.swatch.active{border-color:#fff;transform:scale(1.15)}

/* Sliders */
.slider-row{
  display:flex;
  align-items:center;
  gap:8px;
  margin-bottom:8px;
}
.slider-row:last-child{margin-bottom:0}
.slider-label{
  font-size:.72rem;
  font-weight:500;
  color:var(--text-dim);
  min-width:58px;
}
.slider-val{
  font-family:'JetBrains Mono',monospace;
  font-size:.68rem;
  color:var(--text);
  min-width:28px;
  text-align:right;
}
input[type=range]{
  flex:1;
  -webkit-appearance:none;
  height:4px;
  border-radius:2px;
  background:#2a2a40;
  outline:none;
}
input[type=range]::-webkit-slider-thumb{
  -webkit-appearance:none;
  width:14px;height:14px;
  border-radius:50%;
  background:var(--accent);
  cursor:pointer;
  border:2px solid var(--bg);
}

/* Toggle */
.toggle-row{
  display:flex;
  align-items:center;
  justify-content:space-between;
}
.toggle{
  width:36px;height:20px;
  border-radius:10px;
  background:#2a2a40;
  position:relative;
  cursor:pointer;
  transition:background .2s;
}
.toggle.on{background:var(--accent)}
.toggle::after{
  content:'';
  position:absolute;
  width:16px;height:16px;
  border-radius:50%;
  background:#fff;
  top:2px;left:2px;
  transition:left .2s;
}
.toggle.on::after{left:18px}

/* Action buttons */
.actions{
  display:flex;
  gap:6px;
  flex-wrap:wrap;
}
.act-btn{
  flex:1;
  min-width:60px;
  padding:8px 6px;
  border:1px solid var(--panel-border);
  border-radius:8px;
  background:transparent;
  color:var(--text);
  font-family:'DM Sans',sans-serif;
  font-size:.72rem;
  font-weight:600;
  cursor:pointer;
  transition:all .15s;
  display:flex;
  align-items:center;
  justify-content:center;
  gap:4px;
}
.act-btn:hover{border-color:var(--accent);background:rgba(124,92,255,.1)}
.act-btn.danger:hover{border-color:#ff4060;background:rgba(255,64,96,.1);color:#ff4060}

/* ── CANVAS ── */
.canvas-wrap{
  flex:1;
  position:relative;
  overflow:hidden;
  background:var(--bg);
}
canvas{
  display:block;
  width:100%;
  height:100%;
  cursor:crosshair;
}

/* Mobile sidebar toggle */
.menu-toggle{
  display:none;
  position:fixed;
  top:12px;left:12px;
  z-index:20;
  width:40px;height:40px;
  border-radius:10px;
  background:var(--panel);
  border:1px solid var(--panel-border);
  color:var(--text);
  font-size:1.2rem;
  cursor:pointer;
  align-items:center;
  justify-content:center;
}
@media(max-width:700px){
  .sidebar{
    position:fixed;
    left:-270px;
    top:0;bottom:0;
    transition:left .3s;
    z-index:15;
  }
  .sidebar.open{left:0}
  .menu-toggle{display:flex}
}
</style>
</head>
<body>

<button class="menu-toggle" id="menuToggle">☰</button>

<div class="app">
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-header">
      <h1>Fractal Painter</h1>
      <p>Draw and watch fractals bloom</p>
    </div>

    <!-- Symmetry -->
    <div class="section">
      <div class="section-title">Symmetry Mode</div>
      <div class="sym-grid" id="symGrid">
        <button class="sym-btn active" data-sym="none">None</button>
        <button class="sym-btn" data-sym="mirror">Mirror</button>
        <button class="sym-btn" data-sym="4fold">4-fold</button>
        <button class="sym-btn" data-sym="6fold">6-fold</button>
        <button class="sym-btn" data-sym="8fold">8-fold</button>
        <button class="sym-btn" data-sym="kaleidoscope">Kaleidoscope</button>
        <button class="sym-btn" data-sym="snowflake">Snowflake</button>
        <button class="sym-btn" data-sym="spiral">Spiral</button>
      </div>
    </div>

    <!-- Colors -->
    <div class="section">
      <div class="section-title">Color</div>
      <div class="swatches" id="swatches"></div>
    </div>

    <!-- Brush -->
    <div class="section">
      <div class="section-title">Brush</div>
      <div class="slider-row">
        <span class="slider-label">Size</span>
        <input type="range" id="brushSize" min="1" max="40" value="6">
        <span class="slider-val" id="brushSizeVal">6</span>
      </div>
      <div class="slider-row">
        <span class="slider-label">Opacity</span>
        <input type="range" id="opacity" min="5" max="100" value="80">
        <span class="slider-val" id="opacityVal">80</span>
      </div>
    </div>

    <!-- Fractal -->
    <div class="section">
      <div class="section-title">Fractal</div>
      <div class="slider-row">
        <span class="slider-label">Depth</span>
        <input type="range" id="fractalDepth" min="1" max="6" value="3">
        <span class="slider-val" id="fractalDepthVal">3</span>
      </div>
      <div class="slider-row">
        <span class="slider-label">Scale</span>
        <input type="range" id="fractalScale" min="20" max="90" value="55">
        <span class="slider-val" id="fractalScaleVal">55</span>
      </div>
    </div>

    <!-- Glow -->
    <div class="section">
      <div class="toggle-row">
        <span class="slider-label">Glow Effect</span>
        <div class="toggle on" id="glowToggle"></div>
      </div>
    </div>

    <!-- Actions -->
    <div class="section">
      <div class="section-title">Actions</div>
      <div class="actions">
        <button class="act-btn" id="undoBtn">↩ Undo</button>
        <button class="act-btn danger" id="clearBtn">✕ Clear</button>
        <button class="act-btn" id="saveBtn">↓ Save PNG</button>
      </div>
    </div>
  </aside>

  <div class="canvas-wrap">
    <canvas id="canvas"></canvas>
  </div>
</div>

<script>
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');

// ── Hi-DPI setup ──
let W, H, dpr;
function resize(){
  dpr = window.devicePixelRatio || 1;
  const rect = canvas.parentElement.getBoundingClientRect();
  W = rect.width; H = rect.height;
  canvas.width = W * dpr;
  canvas.height = H * dpr;
  canvas.style.width = W + 'px';
  canvas.style.height = H + 'px';
  ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
  redraw();
}
window.addEventListener('resize', resize);

// ── State ──
const colors = [
  '#7c5cff','#ff5ca0','#5cf0ff','#5cff7c','#ffcf5c',
  '#ff5c5c','#c45cff','#5c8fff','#ff8f5c','#ffffff',
  '#f0f0f0','#888888'
];
let brushColor = colors[0];
let brushSize = 6;
let opacity = 0.8;
let fractalDepth = 3;
let fractalScale = 0.55;
let glowOn = true;
let symmetry = 'none';

// Stroke history for undo
let strokes = []; // each: {points:[], color, size, opacity, depth, scale, glow, sym}
let currentStroke = null;
let drawing = false;

// ── Render swatches ──
const swatchesEl = document.getElementById('swatches');
colors.forEach((c,i) => {
  const s = document.createElement('div');
  s.className = 'swatch' + (i===0?' active':'');
  s.style.background = c;
  s.addEventListener('click', () => {
    document.querySelectorAll('.swatch').forEach(x=>x.classList.remove('active'));
    s.classList.add('active');
    brushColor = c;
  });
  swatchesEl.appendChild(s);
});

// ── Symmetry buttons ──
document.querySelectorAll('.sym-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.sym-btn').forEach(b=>b.classList.remove('active'));
    btn.classList.add('active');
    symmetry = btn.dataset.sym;
  });
});

// ── Sliders ──
function bindSlider(id, valId, cb){
  const sl = document.getElementById(id);
  const vl = document.getElementById(valId);
  sl.addEventListener('input', () => { vl.textContent = sl.value; cb(+sl.value); });
}
bindSlider('brushSize','brushSizeVal', v => brushSize = v);
bindSlider('opacity','opacityVal', v => opacity = v / 100);
bindSlider('fractalDepth','fractalDepthVal', v => fractalDepth = v);
bindSlider('fractalScale','fractalScaleVal', v => fractalScale = v / 100);

// ── Glow toggle ──
const glowToggle = document.getElementById('glowToggle');
glowToggle.addEventListener('click', () => {
  glowOn = !glowOn;
  glowToggle.classList.toggle('on', glowOn);
});

// ── Mobile menu ──
document.getElementById('menuToggle').addEventListener('click', () => {
  document.getElementById('sidebar').classList.toggle('open');
});

// ── Drawing ──
function getPos(e){
  const rect = canvas.getBoundingClientRect();
  const t = e.touches ? e.touches[0] : e;
  return { x: t.clientX - rect.left, y: t.clientY - rect.top };
}

canvas.addEventListener('mousedown', startDraw);
canvas.addEventListener('mousemove', moveDraw);
canvas.addEventListener('mouseup', endDraw);
canvas.addEventListener('mouseleave', endDraw);
canvas.addEventListener('touchstart', e => { e.preventDefault(); startDraw(e); }, {passive:false});
canvas.addEventListener('touchmove', e => { e.preventDefault(); moveDraw(e); }, {passive:false});
canvas.addEventListener('touchend', endDraw);

function startDraw(e){
  drawing = true;
  const p = getPos(e);
  currentStroke = {
    points: [p],
    color: brushColor,
    size: brushSize,
    opacity: opacity,
    depth: fractalDepth,
    scale: fractalScale,
    glow: glowOn,
    sym: symmetry
  };
}
function moveDraw(e){
  if(!drawing || !currentStroke) return;
  const p = getPos(e);
  currentStroke.points.push(p);
  redraw();
  // Draw current stroke on top
  renderStroke(currentStroke);
}
function endDraw(){
  if(currentStroke && currentStroke.points.length > 1){
    strokes.push(currentStroke);
  }
  currentStroke = null;
  drawing = false;
  redraw();
}

// ── Undo / Clear / Save ──
document.getElementById('undoBtn').addEventListener('click', () => {
  strokes.pop();
  redraw();
});
document.getElementById('clearBtn').addEventListener('click', () => {
  strokes = [];
  redraw();
});
document.getElementById('saveBtn').addEventListener('click', () => {
  const link = document.createElement('a');
  link.download = 'fractal-painter.png';
  link.href = canvas.toDataURL('image/png');
  link.click();
});

// ── Redraw ──
function redraw(){
  ctx.save();
  ctx.setTransform(dpr,0,0,dpr,0,0);
  ctx.fillStyle = '#0a0a12';
  ctx.fillRect(0, 0, W, H);
  strokes.forEach(s => renderStroke(s));
  ctx.restore();
}

// ── Render a stroke with fractal + symmetry ──
function renderStroke(s){
  const transforms = getSymmetryTransforms(s.sym);
  
  transforms.forEach(tf => {
    ctx.save();
    ctx.globalAlpha = s.opacity;
    
    if(s.glow){
      ctx.shadowColor = s.color;
      ctx.shadowBlur = s.size * 1.5;
    }
    
    // Apply symmetry transform
    ctx.translate(W/2, H/2);
    if(tf.rotate) ctx.rotate(tf.rotate);
    if(tf.scaleX) ctx.scale(tf.scaleX, 1);
    ctx.translate(-W/2, -H/2);

    // Draw each segment
    for(let i = 1; i < s.points.length; i++){
      const p0 = s.points[i-1];
      const p1 = s.points[i];
      drawFractalLine(p0.x, p0.y, p1.x, p1.y, s.size, s.color, s.depth, s.scale, 0);
    }
    
    ctx.restore();
  });
}

function drawFractalLine(x1,y1,x2,y2,size,color,depth,scale,level){
  // Draw the base line
  ctx.beginPath();
  ctx.moveTo(x1,y1);
  ctx.lineTo(x2,y2);
  ctx.strokeStyle = color;
  ctx.lineWidth = Math.max(0.5, size * Math.pow(scale, level));
  ctx.lineCap = 'round';
  ctx.stroke();

  if(level >= depth) return;

  const dx = x2 - x1;
  const dy = y2 - y1;
  const len = Math.sqrt(dx*dx + dy*dy);
  if(len < 2) return;

  const mx = (x1+x2)/2;
  const my = (y1+y2)/2;
  const newLen = len * scale;

  // Branch angles
  const baseAngle = Math.atan2(dy, dx);
  const angles = [baseAngle + Math.PI/4, baseAngle - Math.PI/4];

  angles.forEach(a => {
    const ex = mx + Math.cos(a) * newLen;
    const ey = my + Math.sin(a) * newLen;
    drawFractalLine(mx, my, ex, ey, size, color, depth, scale, level + 1);
  });
}

function getSymmetryTransforms(sym){
  const t = [{rotate:0, scaleX:1}];
  switch(sym){
    case 'none': return t;
    case 'mirror':
      return [
        {rotate:0, scaleX:1},
        {rotate:0, scaleX:-1}
      ];
    case '4fold':
      return Array.from({length:4}, (_,i) => ({rotate: i * Math.PI/2, scaleX:1}));
    case '6fold':
      return Array.from({length:6}, (_,i) => ({rotate: i * Math.PI/3, scaleX:1}));
    case '8fold':
      return Array.from({length:8}, (_,i) => ({rotate: i * Math.PI/4, scaleX:1}));
    case 'kaleidoscope':
      return Array.from({length:12}, (_,i) => ({
        rotate: i * Math.PI/6,
        scaleX: i % 2 === 0 ? 1 : -1
      }));
    case 'snowflake':
      const sf = [];
      for(let i=0;i<6;i++){
        sf.push({rotate: i * Math.PI/3, scaleX:1});
        sf.push({rotate: i * Math.PI/3, scaleX:-1});
      }
      return sf;
    case 'spiral':
      return Array.from({length:8}, (_,i) => ({
        rotate: i * Math.PI/4 + i * 0.15,
        scaleX: 1
      }));
    default: return t;
  }
}

// ── Init ──
resize();
</script>
</body>
</html>
