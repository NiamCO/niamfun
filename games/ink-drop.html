<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ink Drop</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{background:#f0ece4;overflow:hidden;height:100vh;font-family:'DM Sans',sans-serif;cursor:crosshair;margin:0}
canvas{display:block}

.toolbar{
  position:fixed;bottom:16px;left:50%;transform:translateX(-50%);
  display:flex;gap:4px;z-index:10;
  background:rgba(240,236,228,.92);backdrop-filter:blur(10px);
  border:1px solid rgba(0,0,0,.06);border-radius:14px;padding:5px;
  box-shadow:0 4px 20px rgba(0,0,0,.08);
}
.swatch{
  width:32px;height:32px;border-radius:50%;cursor:pointer;
  border:3px solid transparent;transition:all .15s;
  position:relative;
}
.swatch:hover{transform:scale(1.1)}
.swatch.on{border-color:rgba(0,0,0,.3);transform:scale(1.15)}
.swatch::after{
  content:'';position:absolute;inset:3px;border-radius:50%;
  background:inherit;
}

.divider{width:1px;background:rgba(0,0,0,.08);margin:4px 2px}

.tb{
  padding:6px 14px;border-radius:10px;border:1px solid rgba(0,0,0,.06);
  background:none;color:rgba(0,0,0,.4);cursor:pointer;
  font-family:'DM Sans',sans-serif;font-size:.6rem;font-weight:600;
  text-transform:uppercase;letter-spacing:.5px;transition:all .12s;
  display:flex;align-items:center;gap:4px;
}
.tb:hover{color:rgba(0,0,0,.7);background:rgba(0,0,0,.04)}

.hint{
  position:fixed;top:16px;left:50%;transform:translateX(-50%);
  font-size:.6rem;color:rgba(0,0,0,.2);z-index:10;pointer-events:none;
  letter-spacing:.5px;
}
</style>
</head>
<body>
<canvas id="c"></canvas>
<div class="hint">click or drag to drop ink</div>

<div class="toolbar">
  <div class="swatch on" data-color="0" style="background:#1a1a2e"></div>
  <div class="swatch" data-color="1" style="background:#c0392b"></div>
  <div class="swatch" data-color="2" style="background:#2471a3"></div>
  <div class="swatch" data-color="3" style="background:#1e8449"></div>
  <div class="swatch" data-color="4" style="background:#7d3c98"></div>
  <div class="swatch" data-color="5" style="background:#d4ac0d"></div>
  <div class="divider"></div>
  <button class="tb" id="clearBtn">✕ Clear</button>
  <button class="tb" id="saveBtn">↓ Save</button>
</div>

<script>
const C=document.getElementById('c'),X=C.getContext('2d');
let W,H;
function resize(){W=C.width=innerWidth;H=C.height=innerHeight;drawBase()}
resize();addEventListener('resize',resize);

const COLORS=[
  {r:26,g:26,b:46},    // dark navy
  {r:192,g:57,b:43},   // crimson
  {r:36,g:113,b:163},  // ocean blue
  {r:30,g:132,b:73},   // forest green
  {r:125,g:60,b:152},  // purple
  {r:212,g:172,b:13},  // gold
];

let selectedColor=0;
let drops=[];     // active ink drops with particles
let stains=[];    // permanent stain marks on the "paper"
let mouseDown=false;
let mx=0,my=0;
let dropCooldown=0;

// ═══════════════════════════════════════════
//  BASE CANVAS (paper texture)
// ═══════════════════════════════════════════
function drawBase(){
  // Warm paper background
  X.fillStyle='#f0ece4';
  X.fillRect(0,0,W,H);
  
  // Subtle paper grain
  for(let i=0;i<8000;i++){
    const x=Math.random()*W,y=Math.random()*H;
    const a=Math.random()*0.03;
    X.fillStyle=`rgba(0,0,0,${a})`;
    X.fillRect(x,y,1,1);
  }
  
  // Subtle water ripple texture
  for(let i=0;i<15;i++){
    const x=Math.random()*W,y=Math.random()*H;
    const r=30+Math.random()*80;
    X.beginPath();X.arc(x,y,r,0,Math.PI*2);
    X.strokeStyle=`rgba(0,0,0,${0.005+Math.random()*0.005})`;
    X.lineWidth=0.5;X.stroke();
  }
}

// ═══════════════════════════════════════════
//  INK DROP SYSTEM
// ═══════════════════════════════════════════
class InkDrop{
  constructor(x,y,colorIdx){
    this.x=x;this.y=y;
    this.color=COLORS[colorIdx];
    this.particles=[];
    this.age=0;
    this.alive=true;
    
    // Core bloom particles
    const numCore=40+Math.floor(Math.random()*20);
    for(let i=0;i<numCore;i++){
      const angle=Math.random()*Math.PI*2;
      const speed=0.3+Math.random()*2.5;
      const size=1.5+Math.random()*4;
      this.particles.push({
        x,y,
        vx:Math.cos(angle)*speed,
        vy:Math.sin(angle)*speed,
        size,
        maxSize:size,
        life:1,
        decay:0.003+Math.random()*0.006,
        type:'core',
        angle,
        wobble:Math.random()*Math.PI*2,
        wobbleSpeed:0.02+Math.random()*0.04,
        drag:0.97+Math.random()*0.025,
      });
    }
    
    // Tendril particles (slower, directional)
    const numTendrils=5+Math.floor(Math.random()*4);
    for(let t=0;t<numTendrils;t++){
      const angle=((t/numTendrils)*Math.PI*2)+Math.random()*0.5;
      const len=8+Math.floor(Math.random()*12);
      for(let j=0;j<len;j++){
        const speed=1+Math.random()*1.5+j*0.15;
        const spread=(Math.random()-0.5)*0.3;
        this.particles.push({
          x,y,
          vx:Math.cos(angle+spread)*speed,
          vy:Math.sin(angle+spread)*speed,
          size:3-j*0.15,
          maxSize:3-j*0.15,
          life:1,
          decay:0.004+Math.random()*0.003,
          type:'tendril',
          delay:j*2,
          angle:angle+spread,
          wobble:Math.random()*Math.PI*2,
          wobbleSpeed:0.03+Math.random()*0.03,
          drag:0.96+Math.random()*0.02,
          started:false,
        });
      }
    }
    
    // Splatter (fast, tiny, sparse)
    const numSplatter=10+Math.floor(Math.random()*10);
    for(let i=0;i<numSplatter;i++){
      const angle=Math.random()*Math.PI*2;
      const speed=3+Math.random()*4;
      this.particles.push({
        x:x+(Math.random()-.5)*6,
        y:y+(Math.random()-.5)*6,
        vx:Math.cos(angle)*speed,
        vy:Math.sin(angle)*speed,
        size:0.5+Math.random()*1.5,
        maxSize:1.5,
        life:1,
        decay:0.015+Math.random()*0.015,
        type:'splat',
        drag:0.93,
        wobble:0,wobbleSpeed:0,
        delay:0,started:true,
      });
    }
  }
  
  update(){
    this.age++;
    let allDead=true;
    
    for(const p of this.particles){
      // Handle delay (for tendrils)
      if(p.delay&&p.delay>0){p.delay--;continue}
      if(!p.started)p.started=true;
      if(p.life<=0)continue;
      allDead=false;
      
      // Wobble (organic flow)
      p.wobble+=p.wobbleSpeed;
      const wobbleX=Math.sin(p.wobble)*0.15;
      const wobbleY=Math.cos(p.wobble*1.3)*0.15;
      
      p.vx=(p.vx+wobbleX)*p.drag;
      p.vy=(p.vy+wobbleY)*p.drag;
      p.x+=p.vx;
      p.y+=p.vy;
      p.life-=p.decay;
      p.size=p.maxSize*Math.max(0,p.life);
      
      // Leave stain marks on paper
      if(p.life>0.1&&this.age%2===0&&p.started){
        stains.push({
          x:p.x,y:p.y,
          r:p.size*0.8,
          color:this.color,
          alpha:p.life*0.15*(p.type==='core'?1:0.7),
        });
      }
    }
    
    if(allDead)this.alive=false;
  }
  
  draw(){
    for(const p of this.particles){
      if(!p.started||p.life<=0)continue;
      
      const alpha=p.life*(p.type==='splat'?0.6:p.type==='tendril'?0.5:0.4);
      
      X.beginPath();
      X.arc(p.x,p.y,Math.max(0.3,p.size),0,Math.PI*2);
      X.fillStyle=`rgba(${this.color.r},${this.color.g},${this.color.b},${alpha})`;
      X.fill();
    }
  }
}

// ═══════════════════════════════════════════
//  INPUT
// ═══════════════════════════════════════════
C.addEventListener('mousedown',e=>{mouseDown=true;mx=e.clientX;my=e.clientY;addDrop()});
C.addEventListener('mousemove',e=>{mx=e.clientX;my=e.clientY;if(mouseDown)addDrop()});
C.addEventListener('mouseup',()=>mouseDown=false);
C.addEventListener('mouseleave',()=>mouseDown=false);
C.addEventListener('touchstart',e=>{e.preventDefault();mouseDown=true;mx=e.touches[0].clientX;my=e.touches[0].clientY;addDrop()},{passive:false});
C.addEventListener('touchmove',e=>{e.preventDefault();mx=e.touches[0].clientX;my=e.touches[0].clientY;if(mouseDown)addDrop()},{passive:false});
C.addEventListener('touchend',()=>mouseDown=false);

function addDrop(){
  dropCooldown--;
  if(dropCooldown>0)return;
  dropCooldown=6; // throttle drops while dragging
  drops.push(new InkDrop(mx+(Math.random()-.5)*4,my+(Math.random()-.5)*4,selectedColor));
}

// Swatches
document.querySelectorAll('.swatch').forEach(s=>{
  s.addEventListener('click',()=>{
    document.querySelectorAll('.swatch').forEach(x=>x.classList.remove('on'));
    s.classList.add('on');
    selectedColor=+s.dataset.color;
  });
});

// Clear
document.getElementById('clearBtn').addEventListener('click',()=>{
  drops=[];stains=[];drawBase();
});

// Save
document.getElementById('saveBtn').addEventListener('click',()=>{
  const link=document.createElement('a');
  link.download='ink-drop.png';link.href=C.toDataURL('image/png');link.click();
});

// ═══════════════════════════════════════════
//  RENDER LOOP
// ═══════════════════════════════════════════
function render(){
  // Don't clear - we paint on top of the paper
  // But we need to redraw base + permanent stains + active drops
  
  drawBase();
  
  // Draw permanent stains
  for(const s of stains){
    X.beginPath();
    X.arc(s.x,s.y,s.r,0,Math.PI*2);
    X.fillStyle=`rgba(${s.color.r},${s.color.g},${s.color.b},${s.alpha})`;
    X.fill();
  }
  
  // Update & draw active drops
  for(let i=drops.length-1;i>=0;i--){
    drops[i].update();
    drops[i].draw();
    if(!drops[i].alive)drops.splice(i,1);
  }
  
  // Limit stains to prevent lag
  if(stains.length>30000) stains=stains.slice(-20000);
  
  // Cursor ink preview
  X.beginPath();X.arc(mx,my,4,0,Math.PI*2);
  const c=COLORS[selectedColor];
  X.fillStyle=`rgba(${c.r},${c.g},${c.b},0.3)`;X.fill();
  
  requestAnimationFrame(render);
}
render();
</script>
</body>
</html>
