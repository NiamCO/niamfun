  <!DOCTYPE html>

<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{
  min-height:100vh;display:flex;flex-direction:column;
  align-items:center;justify-content:center;
  font-family:'DM Sans',sans-serif;
  transition:background 1s ease;background:#0f0f15;color:#fff;
  overflow:hidden;position:relative;
}
.counter{
  position:fixed;top:18px;left:50%;transform:translateX(-50%);
  font-size:.65rem;font-weight:600;color:rgba(255,255,255,.28);
  letter-spacing:1.5px;text-transform:uppercase;z-index:10;
  display:flex;align-items:center;gap:8px;
  background:rgba(0,0,0,.3);backdrop-filter:blur(8px);
  padding:7px 18px;border-radius:100px;border:1px solid rgba(255,255,255,.05);
}
.counter .num{font-size:1.05rem;font-weight:800;color:#fff;font-variant-numeric:tabular-nums;transition:transform .12s}
.counter .num.bump{transform:scale(1.35)}

.the-button{
  width:clamp(150px,30vw,200px);height:clamp(150px,30vw,200px);
  border-radius:50%;border:none;cursor:pointer;
  background:radial-gradient(circle at 35% 32%,#ff4444,#cc0000,#880000);
  box-shadow:0 8px 0 #660000,0 14px 40px rgba(200,0,0,.35),inset 0 -6px 14px rgba(0,0,0,.35),inset 0 6px 14px rgba(255,255,255,.12);
  transition:transform .05s,box-shadow .05s;position:relative;z-index:5;
  -webkit-tap-highlight-color:transparent;
}
.the-button:hover{box-shadow:0 8px 0 #660000,0 18px 55px rgba(255,0,0,.45),inset 0 -6px 14px rgba(0,0,0,.35),inset 0 6px 14px rgba(255,255,255,.18)}
.the-button:active{transform:translateY(6px);box-shadow:0 2px 0 #660000,0 4px 12px rgba(200,0,0,.25),inset 0 -3px 8px rgba(0,0,0,.3),inset 0 3px 8px rgba(255,255,255,.08)}
.the-button::after{content:'';position:absolute;top:13%;left:22%;width:28%;height:16%;border-radius:50%;background:radial-gradient(rgba(255,255,255,.3),transparent);pointer-events:none}

.sub{position:fixed;bottom:18px;left:50%;transform:translateX(-50%);font-size:.62rem;color:rgba(255,255,255,.15);letter-spacing:1px;text-transform:uppercase;z-index:3}

.ft{
  position:fixed;left:50%;top:55%;transform:translate(-50%,0);
  font-size:clamp(1.1rem,3.5vw,1.7rem);font-weight:700;
  text-align:center;max-width:85vw;pointer-events:none;z-index:8;
  line-height:1.3;text-shadow:0 2px 20px rgba(0,0,0,.5);
  opacity:0;
}

.ef{position:fixed;pointer-events:none;z-index:7;font-size:clamp(1.5rem,4vw,2.2rem)}

body.shake{animation:shk .12s linear}
@keyframes shk{0%,100%{transform:translate(0)}25%{transform:translate(-3px,2px)}50%{transform:translate(3px,-2px)}75%{transform:translate(-2px,3px)}}

.sf{position:fixed;inset:0;pointer-events:none;z-index:15;opacity:0;transition:opacity .06s}

.ms{
  position:fixed;top:50%;left:50%;transform:translate(-50%,-50%) scale(0);
  font-size:clamp(1.8rem,5vw,3.5rem);font-weight:800;
  text-align:center;z-index:20;pointer-events:none;
  text-shadow:0 0 40px currentColor;
  opacity:0;transition:transform .35s cubic-bezier(.34,1.56,.64,1),opacity .3s;
}
.ms.show{transform:translate(-50%,-50%) scale(1);opacity:1}

#pcvs{position:fixed;inset:0;pointer-events:none;z-index:6}
</style>
</head>
<body>

// ═══════════════════════════════════════════════════
//  AI PREFETCH (short reactions only)
// ═══════════════════════════════════════════════════
async function fetchAI(){
  if(aiFetching||aiQueue.length>=5)return;
  aiFetching=true;
  try{
    const r=await fetch('https://api.mistral.ai/v1/chat/completions',{
      method:'POST',
      headers:{'Content-Type':'application/json','Authorization':'Bearer '+MK},
      body:JSON.stringify({
        model:'mistral-small-latest',
        messages:[{role:'user',content:`You are a mysterious red button on a website. Someone pressed you (press #${count}). Give a short reaction.

RULES:
- MAXIMUM 8 WORDS. Seriously. 8 words or less. No exceptions.
- Be funny, weird, philosophical, absurd, or self-aware
- Mix it up: existential, sarcastic, gen-z humor, fake errors, cosmic, wholesome, dark, 4th wall breaks
- Reply ONLY with JSON: {"t":"your reaction max 8 words","e":"🔥","bg":"#0a0f1a"}
- bg must be a DARK hex color
- ONLY the JSON object, nothing else`}],
        max_tokens:60,temperature:1.0,
      })
    });
    if(!r.ok)throw new Error(r.status);
    const d=await r.json();
    const txt=d.choices[0].message.content.trim();
    const m=txt.match(/\{[\s\S]*?\}/);
    if(m){
      const p=JSON.parse(m[0]);
      const text=(p.t||p.text||'...').substring(0,50);
      aiQueue.push({t:text,bg:p.bg||'#0f0f15',e:p.e||p.emoji||'✨'});
    }
  }catch(e){console.error('AI:',e)}
  aiFetching=false;
}

// Prefetch on load
fetchAI();setTimeout(fetchAI,1500);setTimeout(fetchAI,3000);

// ═══════════════════════════════════════════════════
//  GET REACTION
// ═══════════════════════════════════════════════════
function getReaction(){
  if(aiQueue.length>0&&(count>20||usedLocal.size>=LOCAL.length*0.6)){
    const r=aiQueue.shift();
    fetchAI();
    return r;
  }
  let avail=[];
  for(let i=0;i<LOCAL.length;i++)if(!usedLocal.has(i))avail.push(i);
  if(!avail.length){usedLocal.clear();avail=LOCAL.map((_,i)=>i)}
  const idx=avail[Math.floor(Math.random()*avail.length)];
  usedLocal.add(idx);
  if(aiQueue.length<4)fetchAI();
  return LOCAL[idx];
}

// ═══════════════════════════════════════════════════
//  MILESTONES
// ═══════════════════════════════════════════════════
const MILES={
  1:"First press.",10:"Double digits.",25:"25. Committed.",
  42:"42 — The Answer.",50:"Half century.",69:"Nice.",
  100:"💯",123:"1-2-3.",200:"Send help.",
  300:"THIS. IS. BUTTON.",365:"One per day.",
  404:"404: Life not found.",420:"Blaze it 🌿",
  500:"Half a thousand.",666:"Portal opened 😈",
  777:"Lucky sevens.",1000:"🏆 LEGEND.",
  1337:"L33T.",
  2000:"Millennium.",
  5000:"Transcendence.",
  10000:"YOU ARE THE BUTTON.",
   50000:"50,000 PRESSES. WHAT HAVE YOU DONE WITH UR LIFE.",
  100000:"100,000 PRESSES. IF YOU KEEP GOING, YOU MIGHT HIT THE.. seCretTT..."
  500000:"STOPPPP!PP!P!PP! I CANT TAKE IT ANYMORE>>>>S>A>F>fdalfasdf"
  1000000:"no.. I never thought you could reach this point, NO!..... COME TO NIAM DURING A LUNCH TO RECIEVE YOUR PRIZE!"
};

// ═══════════════════════════════════════════════════
//  PRESS
// ═══════════════════════════════════════════════════
btn.addEventListener('click',press);

function press(){
  count++;
  pressesSinceText++;
  localStorage.setItem('btn_c',count);
  cntEl.textContent=count;
  cntEl.classList.add('bump');
  setTimeout(()=>cntEl.classList.remove('bump'),150);

  // Always: particles + shake + emoji
  const r=getReaction(); // get one but might not show text
  burstParticles();
  document.body.classList.remove('shake');
  void document.body.offsetWidth;
  document.body.classList.add('shake');
  flashEl.style.background='rgba(255,255,255,0.15)';
  flashEl.style.opacity='0.12';
  setTimeout(()=>flashEl.style.opacity='0',80);

  // Small emoji puff every press
  miniEmoji(r.e);

  // Milestone always shows
  if(MILES[count]){
    showMilestone(MILES[count]);
    pressesSinceText=0;
    nextTextAt=3+Math.floor(Math.random()*3);
    return;
  }

  // Show text only every 3-5 presses
  if(pressesSinceText>=nextTextAt){
    pressesSinceText=0;
    nextTextAt=3+Math.floor(Math.random()*3); // next text in 3-5 presses

    document.body.style.background=r.bg;
    showFloatText(r.t);
    burstEmoji(r.e);
  }

  // Sub text
  const subs=["again","do it","more","keep going","🔴","...","tap","go on","once more"];
  subEl.textContent=subs[Math.floor(Math.random()*subs.length)];
}

// ═══════════════════════════════════════════════════
//  VISUALS
// ═══════════════════════════════════════════════════
function showFloatText(text){
  // Remove old one with fade
  if(currentFloatEl){
    const old=currentFloatEl;
    old.animate([{opacity:1},{opacity:0}],{duration:300,fill:'forwards'});
    setTimeout(()=>old.remove(),350);
  }

  const el=document.createElement('div');
  el.className='ft';
  el.textContent=text;
  el.style.top=(42+Math.random()*16)+'%';
  document.body.appendChild(el);
  currentFloatEl=el;

  el.animate([
    {opacity:0,transform:'translate(-50%,15px)'},
    {opacity:1,transform:'translate(-50%,0)'},
  ],{duration:400,fill:'forwards',easing:'cubic-bezier(.25,.46,.45,.94)'});

  // Fade out after 4 seconds
  setTimeout(()=>{
    if(currentFloatEl===el){
      el.animate([{opacity:1},{opacity:0,transform:'translate(-50%,-20px)'}],{duration:800,fill:'forwards'});
      setTimeout(()=>{if(currentFloatEl===el)currentFloatEl=null;el.remove()},900);
    }
  },4000);
}

function miniEmoji(emoji){
  const el=document.createElement('div');
  el.className='ef';
  el.textContent=emoji;
  el.style.left='50%';el.style.top='50%';
  el.style.fontSize='1.2rem';
  document.body.appendChild(el);
  const a=-Math.PI/2+(Math.random()-.5)*1.5;
  const d=40+Math.random()*50;
  el.animate([
    {opacity:.7,transform:`translate(-50%,-50%) scale(1)`},
    {opacity:0,transform:`translate(${Math.cos(a)*d-6}px,${Math.sin(a)*d-6}px) scale(0.4)`}
  ],{duration:600,easing:'ease-out'});
  setTimeout(()=>el.remove(),650);
}

function burstEmoji(emoji){
  const num=4+Math.floor(Math.random()*3);
  for(let i=0;i<num;i++){
    const el=document.createElement('div');
    el.className='ef';
    el.textContent=emoji;
    el.style.left=(35+Math.random()*30)+'%';
    el.style.top=(30+Math.random()*30)+'%';
    document.body.appendChild(el);
    const a=-Math.PI/2+(Math.random()-.5)*2.5;
    const d=70+Math.random()*120;
    el.animate([
      {opacity:1,transform:'translate(0,0) scale(1) rotate(0deg)'},
      {opacity:0,transform:`translate(${Math.cos(a)*d}px,${Math.sin(a)*d}px) scale(0.3) rotate(${(Math.random()-.5)*180}deg)`}
    ],{duration:900+Math.random()*400,easing:'cubic-bezier(.25,.46,.45,.94)'});
    setTimeout(()=>el.remove(),1400);
  }
}

function burstParticles(){
  const btnR=btn.getBoundingClientRect();
  const bx=btnR.left+btnR.width/2,by=btnR.top+btnR.height/2;
  const cols=['#ff4444','#ff6666','#ff8888','#ffaaaa','#fff'];
  for(let i=0;i<12;i++){
    const a=Math.random()*Math.PI*2,s=2+Math.random()*4;
    particles.push({x:bx,y:by,vx:Math.cos(a)*s,vy:Math.sin(a)*s-1.5,life:1,color:cols[i%cols.length],size:2+Math.random()*2.5,grav:true});
  }
}

function showMilestone(text){
  msEl.textContent=text;
  msEl.classList.add('show');
  for(let i=0;i<25;i++){
    const a=Math.random()*Math.PI*2,s=3+Math.random()*5;
    particles.push({x:W/2,y:H/2,vx:Math.cos(a)*s,vy:Math.sin(a)*s,life:1.5,color:['#fbbf24','#f59e0b','#fcd34d','#fff'][i%4],size:3+Math.random()*3,grav:false});
  }
  setTimeout(()=>msEl.classList.remove('show'),2200);
}

// Particle render loop
function updateP(){
  cx.clearRect(0,0,W,H);
  for(let i=particles.length-1;i>=0;i--){
    const p=particles[i];
    p.x+=p.vx;p.y+=p.vy;
    if(p.grav)p.vy+=0.1;
    p.vx*=0.98;p.life-=0.02;
    if(p.life<=0){particles.splice(i,1);continue}
    cx.globalAlpha=Math.min(1,p.life);
    cx.beginPath();cx.arc(p.x,p.y,p.size*p.life,0,Math.PI*2);
    cx.fillStyle=p.color;cx.shadowColor=p.color;cx.shadowBlur=5;
    cx.fill();cx.shadowBlur=0;
  }
  cx.globalAlpha=1;
  requestAnimationFrame(updateP);
}
updateP();
